<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnderConstruction</title>
  <style>
    :root {
      --primary-purple: #8F6CE6;
      --light-purple: #D6C4FF;
      --bg-gradient: linear-gradient(-45deg, #2c1a4d, #4b2c85, #1a2a4d, #4a1a4d);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page-shell {
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 20px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .icon-box {
      margin-bottom: 24px;
    }

    .icon {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 0 10px rgba(143, 108, 230, 0.5));
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.1rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 32px;
    }

    .details {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--light-purple);
    }

    .progress-container {
      margin-bottom: 32px;
      width: 100%;
    }

    .progress-bar {
      background: rgba(255, 255, 255, 0.1);
      height: 10px;
      border-radius: 10px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-purple), var(--light-purple));
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(143, 108, 230, 0.6);
      animation: progressLoad 4s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .progress-fill::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes progressLoad {
      0% { width: 0%; }
      70% { width: 75%; }
      100% { width: 75%; }
    }

    .progress-text {
      font-size: 0.85rem;
      color: var(--light-purple);
      font-weight: 600;
    }

    @media (min-width: 640px) {
      .card { padding: 60px 40px; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <div class="icon-box" aria-hidden="true">
        <svg viewBox="0 0 64 64" class="icon" role="img" aria-label="Under construction icon">
          <path d="M8 42h48v10H8z" fill="#C49AF6" opacity=".35"/>
          <path d="M14 16h36v20H14z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
          <path d="M18 20h28v12H18z" fill="#8F6CE6"/>
          <path d="M24 36v6" stroke="#D6C4FF" stroke-width="4" stroke-linecap="round"/>
          <path d="M40 36v6" stroke="#D6C4FF" stroke-width="4" stroke-linecap="round"/>
          <path d="M32 12v8" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M24 10h16" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Maintenance</h1>
      <p class="subtitle">Some features are currently under development, upgrade, or fixing. We are working hard to improve your experience and will be back shortly.</p>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <span class="progress-text">75% Complete</span>
      </div>

      <div class="details">
        <span>Coming Soon</span>
        <span>Stay tuned for updates</span>
      </div>
    </section>
  </main>
</body>
</html>
