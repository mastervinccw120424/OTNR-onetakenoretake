<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - English Majorship</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">English Majorship Comprehensive</h2>
            <div class="quiz-timer" id="quizTimer">60s</div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;"></div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / 60</p>
            <div id="resultFeedback" class="mb-20">Excellent! Keep on reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="btn-action secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Restart FlashReview
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Which branch of linguistics studies the sound system of a language and the rules that govern sound combinations?", options: ["Morphology", "Phonology", "Syntax", "Semantics"], correct: 1, exp: "Phonology focuses on phonemes and their patterns." },
            { q: "What is the smallest unit of meaning in a language?", options: ["Phoneme", "Morpheme", "Allophone", "Grapheme"], correct: 1, exp: "A morpheme can be a word like 'dog' or an affix like '-ed'." },
            { q: "In the sentence, 'The diligent student passed the exam,' what is the function of the word 'diligent'?", options: ["Noun", "Adverb", "Adjective", "Predicate"], correct: 2, exp: "It modifies the noun 'student'." },
            { q: "Which type of sentence contains one independent clause and at least one dependent (subordinate) clause?", options: ["Simple", "Compound", "Complex", "Compound-Complex"], correct: 2, exp: "Example: 'I stayed home because it was raining.'" },
            { q: "This literary period in British Literature is known as the 'Golden Age of Drama' and features playwrights like William Shakespeare and Christopher Marlowe.", options: ["Victorian Era", "Romantic Period", "Elizabethan Period (Renaissance)", "Neoclassical Period"], correct: 2, exp: "The Elizabethan era saw the flourishing of English drama." },
            { q: "Who is the author of the masterpiece 'The Canterbury Tales,' written in Middle English?", options: ["William Shakespeare", "Geoffrey Chaucer", "John Milton", "Alexander Pope"], correct: 1, exp: "Geoffrey Chaucer is known as the Father of English Literature." },
            { q: "In American Literature, which movement emphasized intuition, nature, and the inherent goodness of people, led by Ralph Waldo Emerson and Henry David Thoreau?", options: ["Realism", "Naturalism", "Transcendentalism", "Modernism"], correct: 2, exp: "Transcendentalism was a philosophical and literary movement in the mid-19th century." },
            { q: "Which Philippine author wrote 'The Woman Who Had Two Navels' and is a National Artist for Literature?", options: ["Jose Garcia Villa", "Nick Joaquin", "F. Sionil Jose", "N.V.M. Gonzalez"], correct: 1, exp: "Nick Joaquin is a giant of Philippine literature in English." },
            { q: "What figure of speech is used in the phrase: 'The wind whispered through the trees'?", options: ["Simile", "Metaphor", "Personification", "Hyperbole"], correct: 2, exp: "Personification gives human qualities to non-human things." },
            { q: "Which language teaching approach prioritizes oral communication and repetitive drills without using the students' native language?", options: ["Grammar-Translation Method", "Audio-Lingual Method (ALM)", "Communicative Language Teaching (CLT)", "Silent Way"], correct: 1, exp: "ALM is based on behaviorist theory—habit formation through drills." },
            { q: "In Homer’s 'The Iliad,' who is the Greek hero whose 'rage' is the central theme of the epic?", options: ["Hector", "Agamemnon", "Achilles", "Odysseus"], correct: 2, exp: "The Iliad begins with the invocation of the rage of Achilles." },
            { q: "What is the term for a word that is spelled the same as another word but has a different meaning and often a different pronunciation?", options: ["Homophone", "Homograph", "Synonym", "Antonym"], correct: 1, exp: "Example: 'lead' (metal) vs. 'lead' (to guide)." },
            { q: "Which assessment tool is used to evaluate a student's performance based on a set of criteria and levels of quality?", options: ["Multiple-choice test", "Rubric", "Cloze test", "Portfolio"], correct: 1, exp: "Rubrics provide clear expectations for assignments." },
            { q: "In Afro-Asian Literature, which Indian author won the Nobel Prize for Literature for his work 'Gitanjali'?", options: ["R.K. Narayan", "Rabindranath Tagore", "Arundhati Roy", "Salman Rushdie"], correct: 1, exp: "Tagore was the first non-European to win the Nobel Prize in Literature." },
            { q: "What is the 'Great Vowel Shift'?", options: ["A change in spelling in the 20th century.", "A major change in the pronunciation of English long vowels (1400-1700).", "The adoption of French words.", "The first English dictionary."], correct: 1, exp: "It marks the transition from Middle English to Modern English." },
            { q: "Which type of irony occurs when the audience knows something that the characters in the story do not?", options: ["Verbal Irony", "Situational Irony", "Dramatic Irony", "Cosmic Irony"], correct: 2, exp: "Dramatic irony creates tension or humor for the audience." },
            { q: "'The sun is a golden ball.' This is an example of:", options: ["Simile", "Metaphor", "Onomatopoeia", "Oxymoron"], correct: 1, exp: "A direct comparison without 'like' or 'as'." },
            { q: "Which linguistic theory suggests that humans are born with an innate ability to acquire language?", options: ["Behaviorism", "Nativism (Universal Grammar)", "Constructivism", "Interactionism"], correct: 1, exp: "Noam Chomsky proposed that humans have a Language Acquisition Device." },
            { q: "In 'The Great Gatsby', what does the 'Green Light' at the end of Daisy’s dock represent?", options: ["Gatsby's wealth", "Gatsby's hopes and dreams", "The danger of the ocean", "Daisy's jealousy"], correct: 1, exp: "The light symbolises Gatsby's longing for his dream." },
            { q: "What is the term for the study of how context contributes to meaning?", options: ["Semantics", "Pragmatics", "Sociolinguistics", "Discourse Analysis"], correct: 1, exp: "Pragmatics looks at 'invisible' meaning or speaker intent." },
            { q: "Who is the 'Father of the English Essay'?", options: ["Francis Bacon", "Michel de Montaigne", "Charles Lamb", "Thomas Carlyle"], correct: 0, exp: "While Montaigne invented the form, Bacon popularized it in English." },
            { q: "Which part of the plot provides the background information about characters and the setting?", options: ["Rising Action", "Climax", "Exposition", "Resolution"], correct: 2, exp: "The exposition introduces the status quo." },
            { q: "What is the 'Input Hypothesis' in Second Language Acquisition (SLA)?", options: ["Learning by speaking", "Being exposed to 'comprehensible input' (i + 1)", "Memorizing grammar", "Learning through error correction"], correct: 1, exp: "Stephen Krashen's theory emphasizes receiving understandable messages." },
            { q: "In Victorian Literature, who wrote 'Wuthering Heights'?", options: ["Charlotte Brontë", "Emily Brontë", "Anne Brontë", "George Eliot"], correct: 1, exp: "Emily Brontë published it under the pseudonym Ellis Bell." },
            { q: "What is a 'Portmanteau' word?", options: ["A borrowed word", "A word combining sounds and meanings of two words", "An onomatopoeia", "A word with no plural"], correct: 1, exp: "Example: Smog (Smoke + Fog) or Brunch (Breakfast + Lunch)." },
            { q: "Which linguistic rule explains the variation in the pronunciation of the plural suffix '-s' in 'cats' (/s/), 'dogs' (/z/), and 'dishes' (/ɪz/)?", options: ["Morphological Rule", "Phonological Rule", "Syntactic Rule", "Semantic Rule"], correct: 1, exp: "These are called allomorphs, which are predictable variations of a morpheme based on the phonetic environment (phonological rules)." },
            { q: "In the sentence 'The committee are arguing about the new policy,' why is a plural verb used with a collective noun?", options: ["It is a grammatical error.", "It follows American English standards.", "The focus is on the individual members acting separately.", "The noun 'committee' is always plural."], correct: 2, exp: "Collective nouns take a plural verb when the members of the group are acting as individuals rather than as a single unit (Notional Concord)." },
            { q: "Who is considered the 'Father of Free Verse' in American Literature, famous for the collection Leaves of Grass?", options: ["Robert Frost", "Edgar Allan Poe", "Walt Whitman", "Emily Dickinson"], correct: 2, exp: "Whitman broke traditional poetic structures, utilizing a style that closely mimicked natural speech." },
            { q: "Which of the following is a 'Diphthong'?", options: ["/æ/ as in bat", "/i:/ as in meet", "/aɪ/ as in my", "/u:/ as in boot"], correct: 2, exp: "A diphthong is a sound formed by the combination of two vowels in a single syllable, where the sound begins as one vowel and moves toward another." },
            { q: "What is the literary term for a poem that mourns the death of a person or laments something lost?", options: ["Ode", "Elegy", "Sonnet", "Ballad"], correct: 1, exp: "An elegy is a reflective poem, usually a lament for the dead (e.g., Gray's 'Elegy Written in a Country Churchyard')." },
            { q: "In language teaching, what is 'Schema Theory'?", options: ["The study of sentence structure.", "The process of habit formation.", "The role of prior knowledge in understanding new information.", "The use of visual aids in the classroom."], correct: 2, exp: "Schemata are mental structures that help learners organize and interpret new data based on what they already know." },
            { q: "Which Philippine National Artist for Literature wrote the short story 'The Wedding Dance'?", options: ["Bienvenido Santos", "Edith Tiempo", "Amador Daguio", "Francisco Sionil Jose"], correct: 2, exp: "Amador Daguio is celebrated for this story which explores the conflict between tribal traditions and personal love." },
            { q: "What is the grammatical function of the gerund in the sentence: 'Smoking is dangerous to your health'?", options: ["Subject", "Direct Object", "Subject Complement", "Appositive"], correct: 0, exp: "The gerund 'Smoking' serves as the topic or subject that the rest of the sentence describes." },
            { q: "Which novel by George Orwell serves as an allegory for the Russian Revolution and the rise of Stalinism?", options: ["1984", "Animal Farm", "Brave New World", "Fahrenheit 451"], correct: 1, exp: "Orwell uses farm animals to represent key historical figures and political movements in the Soviet Union." },
            { q: "What is the 'Affective Filter Hypothesis' by Stephen Krashen?", options: ["Learners need to study grammar rules.", "Language is learned through imitation.", "Emotional variables like anxiety and low confidence can block language acquisition.", "Students should only listen and not speak."], correct: 2, exp: "High anxiety or low motivation acts as a 'filter' that prevents comprehensible input from reaching the language acquisition device." },
            { q: "In Greek Mythology, who is the goddess of wisdom and war who sprang fully grown from the forehead of Zeus?", options: ["Hera", "Aphrodite", "Athena", "Artemis"], correct: 2, exp: "Athena is the patron goddess of Athens, representing strategic warfare and intellectual pursuit." },
            { q: "What do you call the repetition of initial consonant sounds in a line of poetry?", options: ["Alliteration", "Assonance", "Consonance", "Onomatopoeia"], correct: 0, exp: "Example: 'Peter Piper picked a peck of pickled peppers.'" },
            { q: "Which type of assessment is conducted during the instruction to monitor student learning and provide ongoing feedback?", options: ["Summative Assessment", "Formative Assessment", "Placement Assessment", "Diagnostic Assessment"], correct: 1, exp: "Formative assessment helps teachers adjust their teaching strategies while the learning is still happening." },
            { q: "Who wrote the 'Daffodils' (I Wandered Lonely as a Cloud) and is a leading figure of the Romantic Movement?", options: ["William Wordsworth", "Samuel Taylor Coleridge", "Lord Byron", "John Keats"], correct: 0, exp: "Wordsworth emphasized the 'spontaneous overflow of powerful feelings' and the beauty of nature." },
            { q: "What is the term for the smallest unit of sound that can distinguish one word from another?", options: ["Phoneme", "Morpheme", "Grapheme", "Sememe"], correct: 0, exp: "In the words 'pat' and 'bat,' /p/ and /b/ are phonemes because they change the meaning." },
            { q: "In American Literature, who wrote the novel The Catcher in the Rye, featuring the protagonist Holden Caulfield?", options: ["Ernest Hemingway", "F. Scott Fitzgerald", "J.D. Salinger", "Mark Twain"], correct: 2, exp: "The novel is a classic 'coming-of-age' story focusing on teenage alienation and rebellion." },
            { q: "Which of the following is a 'Fused Sentence'?", options: ["I like coffee, he likes tea.", "Although I like coffee.", "I like coffee he likes tea.", "I like coffee; he likes tea."], correct: 2, exp: "A fused sentence occurs when two independent clauses are joined without any punctuation or coordinating conjunction." },
            { q: "What is 'Back-formation' in linguistics?", options: ["Adding a prefix to a word.", "Creating a new word by removing a supposed affix from an existing word.", "Combining two words into one.", "Changing the part of speech without changing the form."], correct: 1, exp: "Example: Creating the verb 'edit' from the noun 'editor.'" },
            { q: "Which Shakespearean play features the 'Star-crossed lovers' from the feuding families of Capulet and Montague?", options: ["Hamlet", "Macbeth", "Romeo and Juliet", "Othello"], correct: 2, exp: "This tragedy is the most famous example of the 'star-crossed lovers' archetype." },
            { q: "What is the primary goal of the 'Communicative Language Teaching' (CLT) approach?", options: ["Perfection in grammar.", "Developing 'communicative competence' or the ability to use language in real contexts.", "Translating texts from L2 to L1.", "Memorizing dialogues."], correct: 1, exp: "CLT focuses on interaction as both the means and the ultimate goal of study." },
            { q: "Who is the African author of Things Fall Apart, which depicts the clash between traditional Ibo culture and British colonialism?", options: ["Wole Soyinka", "Chinua Achebe", "Ngũgĩ wa Thiong'o", "Chimamanda Ngozi Adichie"], correct: 1, exp: "Achebe is often called the 'Father of Modern African Literature.'" },
            { q: "What is a 'Euphemism'?", options: ["An exaggeration for effect.", "A mild or indirect expression used to replace one that is harsh or blunt.", "A play on words.", "A comparison using 'like' or 'as'."], correct: 1, exp: "Example: Using 'passed away' instead of 'died.'" },
            { q: "In grammar, what is a 'Dangling Modifier'?", options: ["A word that modifies a noun correctly.", "A modifier that has no clear subject to describe in the sentence.", "A verb that is in the wrong tense.", "A pronoun with no antecedent."], correct: 1, exp: "Example: 'Running down the street, the house was beautiful.' (It sounds like the house was running)." },
            { q: "Which Philippine National Artist wrote the poem 'Seven Hills Away'?", options: ["Nick Joaquin", "N.V.M. Gonzalez", "Jose Garcia Villa", "Carlos P. Romulo"], correct: 1, exp: "Gonzalez is known for his works depicting the Filipino spirit and rural life." },
            { q: "What is the 'Cooperative Principle' in Pragmatics proposed by Paul Grice?", options: ["Teachers and students must cooperate.", "The assumption that participants in a conversation intend to be helpful and relevant.", "Using polite words in a speech.", "Working in groups during language class."], correct: 1, exp: "It involves the four Maxims: Quantity, Quality, Relation, and Manner." },
            { q: "In the play Pygmalion by George Bernard Shaw, what is the central project of Henry Higgins?", options: ["To marry a duchess.", "To train a flower girl to speak like a lady.", "To write a dictionary.", "To escape the city."], correct: 1, exp: "Higgins bets that he can pass off Eliza Doolittle as a duchess by teaching her proper phonetics." },
            { q: "Which type of vocabulary refers to words that a person understands when heard or read, but does not necessarily use in speech or writing?", options: ["Receptive Vocabulary", "Productive Vocabulary", "Academic Vocabulary", "Content Vocabulary"], correct: 0, exp: "Receptive skills (listening/reading) usually encompass a larger set of words than productive skills." },
            { q: "Who wrote A Portrait of the Artist as a Young Man and used the 'Stream of Consciousness' technique?", options: ["Virginia Woolf", "James Joyce", "T.S. Eliot", "D.H. Lawrence"], correct: 1, exp: "Joyce is a master of Modernist literature, focusing on the internal monologues of his characters." },
            { q: "What is the meaning of the prefix 'pseudo-'?", options: ["Against", "Before", "False / Fake", "Many"], correct: 2, exp: "Example: Pseudonym (false name)." },
            { q: "Which of the following is an example of an 'Oxymoron'?", options: ["Time is money.", "Deafening silence.", "The pen is mightier than the sword.", "I'm so hungry I could eat a horse."], correct: 1, exp: "An oxymoron combines two contradictory terms for effect." },
            { q: "What is the 'Critical Period Hypothesis' in language acquisition?", options: ["There is a critical way to correct errors.", "There is a specific window of time (usually before puberty) when language is most easily acquired.", "Adults learn faster than children.", "Grammar is more critical than vocabulary."], correct: 1, exp: "After this 'critical period,' acquiring native-like proficiency in a second language becomes much more difficult." },
            { q: "Who is the 'Comma Queen' of American poetry, known for her unusual use of dashes and capital letters?", options: ["Sylvia Plath", "Maya Angelou", "Emily Dickinson", "Marianne Moore"], correct: 2, exp: "Dickinson’s unique punctuation and brevity were revolutionary for her time." },
            { q: "In the sentence 'I will call you when I arrive,' what kind of clause is 'when I arrive'?", options: ["Noun Clause", "Adjective Clause", "Adverbial Clause", "Independent Clause"], correct: 2, exp: "It modifies the verb 'call' by indicating the time of the action." },
            { q: "Which literary theory focuses on the reader's personal interpretation and experience of the text rather than the author's intent?", options: ["Formalism", "Reader-Response Criticism", "New Historicism", "Psychoanalytic Criticism"], correct: 1, exp: "It posits that a text has no meaning until it is read and interpreted by a reader." },
            { q: "What is the term for a word that imitates the sound it represents?", options: ["Hyperbole", "Metonymy", "Onomatopoeia", "Synecdoche"], correct: 2, exp: "Examples include 'buzz,' 'hiss,' 'splash,' and 'bang.'" }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 60;

        function startQuiz() { showQuestion(); }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                container.appendChild(btn);
            });
            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            startTimer();
        }

        function startTimer() {
            clearInterval(timer); timeLeft = 60;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--; document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) { clearInterval(timer); selectOption(-1); }
            }, 1000);
        }

        function playSound(file) {
            if (localStorage.getItem('isMuted') === 'true') return;
            const audio = new Audio(file);
            audio.play().catch(e => {});
        }

        function selectOption(index) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.disabled = true);
            if (index === q.correct) {
                options[index].classList.add('correct'); score++;
                document.getElementById('feedbackTitle').innerText = "Correct!";
                document.getElementById('feedbackTitle').style.color = "#4CAF50";
                playSound('correct.mp3');
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect";
                document.getElementById('feedbackTitle').style.color = "#f44336";
                playSound('wrong.mp3');
            }
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) showQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            document.getElementById('finalScore').innerText = score;
        }
        startQuiz();
    </script>
</body>
</html>
