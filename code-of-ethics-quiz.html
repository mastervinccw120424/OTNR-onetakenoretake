Make <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - Code of Ethics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script defer src="firebase-config.js"></script>
    <script defer src="quiz-save-helper.js"></script>
    <audio id="sound-finish" src="finish.mp3" preload="auto"></audio>
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">Code of Ethics for Professional Teachers</h2>
            <div class="quiz-timer" id="quizTimer">60s</div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;">1 / 50</div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / <span id="maxScore">50</span></p>
            <div id="resultFeedback" class="mb-20">Great job! Keep reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="btn-action secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Restart FlashReview
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Teacher Maria is a devout member of a specific religious sect. During her Social Studies class, she spends 15 minutes every day explaining why her religion is the \"true\" one. Which provision is she violating?", options: ["Article III: The Teacher and the Community", "Article II, Section 5: A teacher shall not use his position to spread proselytism.", "Article IV: The Teacher and the Profession", "Article VIII: The Teacher and the Learner"], correct: 1, exp: "Teachers are prohibited from using their position to influence students to join their religion (Article II, Section 5)." },
            { q: "During an election period, a teacher campaigns for a local candidate inside the school premises during class hours. Is this allowed?", options: ["Yes, because teachers have freedom of speech.", "No, Article II, Section 7 states a teacher shall not use their position to influence the political activity of others.", "Yes, as long as the teacher does not force the students to vote.", "No, because teachers are not allowed to vote."], correct: 1, exp: "Partisan political activity using one's official position is prohibited (Article II, Section 7)." },
            { q: "A teacher is seen frequently at a local cockpit and is often intoxicated in public. Which Article is the teacher primarily violating?", options: ["Article III, Section 3: A teacher shall merit self-respect and refrain from gambling or drunkenness.", "Article I: Scope and Limitation", "Article V: The Teacher and the Profession", "Article VII: School Officials"], correct: 0, exp: "Teachers must maintain a dignified lifestyle even outside the school (Article III, Section 3)." },
            { q: "What should a teacher do if they discover that a colleague is involved in an illicit relationship with a student?", options: ["Mind their own business.", "Post it on social media to warn the parents.", "Report the matter to the proper authorities (School Head/Board).", "Talk to the student's parents privately and ask for money."], correct: 2, exp: "Article VI, Section 3 mandates reporting justifiable causes against colleagues to the proper authorities." },
            { q: "A parent offers a teacher a brand new smartphone as a \"thank you\" for giving their child a passing grade despite the child's poor performance. What should the teacher do?", options: ["Accept it, since it is a gift and not a bribe.", "Accept it but keep it a secret.", "Refuse the gift, as Article VIII, Section 4 prohibits accepting gifts in exchange for requested concessions.", "Accept it and donate it to the school."], correct: 2, exp: "Accepting gifts for \"favors\" regarding grades is unethical (Article VIII, Section 4)." },
            { q: "Every teacher shall participate in the _________ program of the PRC and shall pursue other studies as will improve their efficiency.", options: ["Personal Development", "Continuing Professional Development (CPD)", "Teacher Induction", "Masteral Degree"], correct: 1, exp: "Article IV, Section 3 emphasizes continuous professional growth through CPD." },
            { q: "A teacher discovers a student is being abused at home. According to the code, the teacher should:", options: ["Ignore it as it happens outside the school.", "Confront the parents and fight them.", "Take the student to their own home.", "Exercise the utmost care and report the matter to the proper authorities."], correct: 3, exp: "The teacher acts in loco parentis and must protect the learner's welfare by reporting abuse to the authorities." },
            { q: "Can a teacher engage in business?", options: ["No, a teacher must focus only on teaching.", "Yes, provided that such business does not affect their efficiency as a teacher.", "Yes, but only if they sell items to their own students.", "No, it is strictly prohibited by the Civil Service."], correct: 1, exp: "Article X, Section 1 allows business, but Section 3 prohibits using one's position to coerce students or parents into purchasing goods." },
            { q: "When a teacher is involved in a professional conflict with a colleague, the first step should be:", options: ["File a lawsuit immediately.", "Discuss the matter with the colleague privately for an amicable settlement.", "Shout at the colleague in the faculty room.", "Resign from the school."], correct: 1, exp: "Article VI, Section 4 encourages private and friendly solutions for professional grievances." },
            { q: "Which article states that \"the interest and welfare of the learners are the first and foremost concern of the teacher\"?", options: ["Article II", "Article IV", "Article VIII", "Article XI"], correct: 2, exp: "Article VIII: The Teacher and the Learner explicitly states this priority." },
            { q: "A teacher is not satisfied with the school's new policy. What is the ethical way to handle this?", options: ["Protest in the streets during school hours.", "Badmouth the principal to the parents.", "Express the grievance through the proper hierarchy/channels.", "Follow the policy but teach poorly in retaliation."], correct: 2, exp: "Professionalism requires using established administrative channels for grievances." },
            { q: "Is it ethical for a teacher to tutor their own failing student for a fee?", options: ["Yes, it helps the student pass.", "No, Article VIII, Section 5 states a teacher shall not accept any assistance or fee from those he/she teaches except those allowed by law.", "Yes, as long as the parent agrees.", "No, because tutoring is not allowed for teachers."], correct: 1, exp: "Tutoring one's own student for pay creates a conflict of interest (Article VIII, Section 5)." },
            { q: "A teacher shall ensure that the conditions of the school are _________ to the learning and growth of the pupils.", options: ["Restricted", "Conducive", "Expensive", "Competitive"], correct: 1, exp: "Article III, Section 2 emphasizes creating a conducive environment for learning and growth." },
            { q: "A teacher's license was revoked because of immoral conduct. Can they still teach in a private school?", options: ["Yes, private schools have their own rules.", "No, a person without a valid license cannot practice the teaching profession in any school.", "Yes, as long as the parents don't find out.", "Only if they teach part-time."], correct: 1, exp: "RA 7836 and the Code of Ethics require a valid license for all professional teachers in any school." },
            { q: "If a teacher is found to have \"justifiable cause\" to leave their position, how much notice should they give the school?", options: ["1 day", "1 week", "30 days", "No notice is needed"], correct: 2, exp: "Article VI, Section 5 mentions a 30-day notice is standard for professional resignation or transition." },
            { q: "Teacher B used the unpublished work of a colleague without giving credit or asking permission. Which ethical principle did he violate?", options: ["Article IV: The Teacher and the Profession", "Article VI, Section 2: Intellectual honesty and recognition of others' work.", "Article VIII: The Teacher and the Learner", "Article II: The Teacher and the State"], correct: 1, exp: "Teachers are expected to practice intellectual honesty and acknowledge the source of ideas used in their own work." },
            { q: "According to Article III, Section 7, what should a teacher do if there is a town project for adult literacy?", options: ["Ignore it as it is outside school hours.", "Ask for extra pay before joining.", "Provide leadership and help when needed for the improvement of the community.", "Wait for the Principal to command them to join."], correct: 2, exp: "Teachers are social leaders and are ethically bound to participate in community movements for social upliftment." },
            { q: "Which of the following is an ethical violation of maintaining a dignified personality as described in Article I?", options: ["Wearing a clean school uniform.", "Engaging in a physical scuffle with a neighbor in public.", "Attending a seminar on the weekends.", "Voting during a national election."], correct: 1, exp: "A teacher must maintain a dignified personality at all times to serve as a model for the youth." },
            { q: "Under Article II, Section 1, what is the teacher’s primary duty as an agent of the state?", options: ["To make students memorize the constitution.", "To transmit the national heritage and promote patriotism.", "To ensure all students become politicians.", "To focus only on science and math."], correct: 1, exp: "Teachers are tasked with instilling pride in the country’s heritage and culture." },
            { q: "How should a teacher handle a disagreement with the school principal regarding a new schedule?", options: ["Post the complaint on a public Facebook group.", "Organize a student strike against the principal.", "Submit to the official hierarchy but use the proper grievance committee.", "Resign immediately without notice."], correct: 2, exp: "Ethics emphasize following the professional hierarchy and administrative channels for resolving conflicts." },
            { q: "Is a teacher allowed to criticize the policies of the school or the government?", options: ["No, they must always agree.", "Yes, provided that the criticism is constructive and expressed through the right channels.", "Yes, but only in private conversations with students.", "No, criticism is a ground for immediate dismissal."], correct: 1, exp: "Professionalism allows for differing opinions as long as they are handled with respect through proper channels." },
            { q: "A teacher’s husband is running for Barangay Captain. May the teacher help in his campaign?", options: ["Yes, because they are married.", "No, teachers are prohibited from engaging in any partisan political activity.", "Yes, but only outside school hours and without using her position as a teacher.", "No, she must file for a leave of absence for the entire year."], correct: 2, exp: "Teachers must not use their official influence or school resources for partisan politics (Article II, Section 7)." },
            { q: "Under Article V, Section 1, how should a teacher view their relationship with school officials?", options: ["As a servant to a master.", "As a professional partner in the service of the learners.", "As a competitor for promotions.", "As an enemy to be avoided."], correct: 1, exp: "Teachers and officials should collaborate in a spirit of mutual respect and cooperation." },
            { q: "A student confesses to a teacher that they are being physically harmed by another teacher. What is the teacher's ethical duty?", options: ["Keep it a secret to protect the colleague.", "Tell the student to just ignore it.", "Report the matter to the proper authorities through the correct channels.", "Confront the colleague and threaten them."], correct: 2, exp: "Reporting justifiable grievances against colleagues is a mandate (Article VI, Section 3) for learner welfare." },
            { q: "Teacher C wants to transfer to another school due to personal reasons. When is the best time to do this?", options: ["In the middle of the school year without telling anyone.", "At the end of the school year, after finishing all professional obligations.", "Whenever she feels like it.", "Only after the principal finds a replacement."], correct: 1, exp: "Article VI, Section 5 states that a teacher shall fulfill their contract until the end of the term." },
            { q: "Which of the following is prohibited according to Article VIII (The Teacher and the Learner)?", options: ["Giving a failing grade to a student who did not meet requirements.", "Accepting expensive jewelry from a parent in exchange for an 'A'.", "Disciplining a student in a non-violent manner.", "Calling the parents to discuss a student’s performance."], correct: 1, exp: "Accepting gifts in exchange for concessions like grades is a violation of professional integrity." },
            { q: "When a teacher evaluates a learner's work, what should be the primary basis?", options: ["The student's personality.", "The student’s parents’ social status.", "The merit and quality of performance of the learner.", "The teacher's personal liking for the student."], correct: 2, exp: "Article VIII, Section 6 requires that assessment and grading be based solely on performance." },
            { q: "Can a teacher discipline a student using 'corporal punishment' like hitting or pinching?", options: ["Yes, if the parents give permission.", "No, Article VIII, Section 8 prohibits the use of physical force or violence on learners.", "Yes, but only for very naughty students.", "No, but only if the student is fragile."], correct: 1, exp: "Teachers are prohibited from using physical force or any form of abuse as a means of discipline." },
            { q: "What is the teacher's role regarding the religion of their students?", options: ["To convert them to the teacher's religion.", "To mock religions they do not agree with.", "To respect the religious beliefs of their students.", "To forbid students from praying in school."], correct: 2, exp: "Teachers must maintain religious neutrality and respect the diversity of beliefs among their learners." },
            { q: "Which of the following is an example of 'Academic Freedom' according to the code?", options: ["Teaching whatever the teacher wants, even if it's incorrect.", "Freedom to use different teaching methods that best serve the learners' needs.", "Freedom to skip classes.", "Freedom to choose which students to teach."], correct: 1, exp: "Academic freedom allows teachers to use professional judgment in selecting effective teaching strategies." },
            { q: "A teacher is offered a position in a rival school while still under contract. Is it ethical to accept?", options: ["Yes, for a higher salary.", "No, unless they have a written release from their current school.", "Yes, contracts do not matter in teaching.", "No, because you should never change schools."], correct: 1, exp: "Professionalism requires honoring contracts and obtaining a formal release before moving." },
            { q: "According to Article IX, a teacher should maintain a _________ relationship with the parents of the learners.", options: ["Romantic", "Business-oriented", "Cooperative and cordial", "Competitive"], correct: 2, exp: "Teachers and parents should work as partners for the welfare of the child." },
            { q: "If a student's parent complains about a grade, the teacher should:", options: ["Shout at the parent for questioning their authority.", "Hear the complaint with sympathy and provide a professional explanation.", "Change the grade immediately to avoid trouble.", "Ignore the parent."], correct: 1, exp: "Article IX, Section 2 mandates that parents' complaints be heard with sympathy and understanding." },
            { q: "Is it ethical for a teacher to use their student to run personal errands during class hours?", options: ["Yes, it teaches the student responsibility.", "No, a teacher shall not use their position to coerce or use students for personal gain.", "Yes, but only if the errand is short.", "Yes, as long as the student says it's okay."], correct: 1, exp: "Using students for personal service is an abuse of authority (Article VIII, Section 2)." },
            { q: "Every teacher shall uphold the highest _________ standards of the profession.", options: ["Wealth", "Ethical and moral", "Political", "Social"], correct: 1, exp: "The teaching profession is a noble calling requiring high moral character." },
            { q: "A teacher wants to run for public office (e.g., City Councilor). What is the requirement?", options: ["They can keep teaching while campaigning.", "They must resign or take a leave of absence as required by the law.", "They can ask their students to distribute flyers.", "They are not allowed to run for office ever."], correct: 1, exp: "Partisan political activity is regulated; running for office usually requires leaving the post to maintain neutrality." },
            { q: "If a teacher is asked to speak at a community event, they should:", options: ["Refuse, because it's extra work.", "Accept, as it fulfills the role of being a leader in the community.", "Accept only if they are paid a large fee.", "Accept only to promote their own political views."], correct: 1, exp: "Teachers are community leaders expected to share knowledge and participate in social development." },
            { q: "Which article focuses on the 'Teacher and the Profession'?", options: ["Article I", "Article IV", "Article X", "Article VIII"], correct: 1, exp: "Article IV outlines the teacher's duties to uphold the dignity of the profession." },
            { q: "Can a teacher disclose confidential information about a student to a random stranger?", options: ["Yes, if it's interesting.", "No, Article VIII, Section 9 requires the protection of the confidentiality of student records.", "Yes, if the student is naughty.", "Only if the stranger pays for the information."], correct: 1, exp: "Teachers must maintain the privacy of learner records and only share them with authorized persons." },
            { q: "A teacher is not happy with the principal's leadership style. What should the teacher NOT do?", options: ["Discuss it in a professional meeting.", "Write a formal letter of grievance.", "Spread rumors about the principal's personal life.", "Talk to the department head."], correct: 2, exp: "Personal attacks and gossip are unprofessional and violate Articles VI and VII." },
            { q: "According to Article X, how should a teacher manage their personal finances?", options: ["Spend all their money immediately.", "Borrow money from students' parents.", "Maintain a good credit standing and pay debts promptly.", "Never pay debts."], correct: 2, exp: "A teacher's financial conduct is part of their public reputation and moral standing." },
            { q: "Why is 'Continuous Professional Development' (CPD) mandatory for teachers?", options: ["To make teachers spend money.", "To ensure teachers are updated with the latest knowledge and skills in education.", "To give teachers more homework.", "To make the PRC busy."], correct: 1, exp: "Professional growth is a duty to ensure the best quality of education for learners." },
            { q: "A teacher is frequently late for class. Which provision is being ignored?", options: ["The duty to be a model of punctuality and dedication.", "The duty to be a political leader.", "The duty to sell goods.", "The duty to travel."], correct: 0, exp: "Professionalism requires dedication to duty and setting a good example for students." },
            { q: "What should a teacher do if they are offered a bribe to pass a student?", options: ["Take the money but fail the student anyway.", "Refuse it immediately and report it if necessary.", "Take the money and pass the student.", "Tell the student to offer more money."], correct: 1, exp: "Bribery is a grave ethical and legal offense." },
            { q: "Under Article XI, who is responsible for the disciplinary action of teachers who violate the code?", options: ["The students.", "The Professional Regulation Commission (PRC).", "The Barangay Captain.", "The parents."], correct: 1, exp: "The PRC has the legal authority to sanction teachers for ethical violations." },
            { q: "A teacher is assigned to a remote area. What should be their attitude?", options: ["Complain every day.", "Resign immediately.", "Accept the challenge and serve the community with dedication.", "Only go to the school once a month."], correct: 2, exp: "Dedication to service regardless of location is a mark of a professional teacher." },
            { q: "Which of the following best describes the teacher's behavior in public?", options: ["They can do whatever they want because it's their life.", "They should behave in a way that reflects credit upon the profession.", "They should only behave well when students are around.", "They should hide from everyone."], correct: 1, exp: "A teacher is a teacher 24/7; their public behavior affects the profession's reputation." },
            { q: "Is it ethical for a teacher to badmouth the teaching profession to their students?", options: ["Yes, if they hate their job.", "No, a teacher should uphold the dignity and nobility of the profession.", "Yes, to discourage students from becoming teachers.", "Only if the salary is low."], correct: 1, exp: "Promoting the profession's dignity is an ethical duty." },
            { q: "A teacher’s primary concern in the classroom should be:", options: ["Getting a promotion.", "Being the most popular teacher.", "The holistic development and welfare of the learners.", "Finishing the textbook as fast as possible."], correct: 2, exp: "The learner is at the center of the teaching-learning process." },
            { q: "What does 'In Loco Parentis' mean for teachers?", options: ["Teachers are the masters of the children.", "Teachers act as the 'second parents' and are responsible for the safety and welfare of children.", "Teachers are the friends of the children.", "Teachers are the siblings of the children."], correct: 1, exp: "Teachers assume parental responsibility while children are under their care at school." }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 60;

        function startQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 60;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    selectOption(-1); 
                }
            }, 1000);
        }

        function selectOption(index) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(btn => btn.disabled = true);
            
            if (index === q.correct) {
                options[index].classList.add('correct');
                score++;
                document.getElementById('feedbackTitle').innerText = "Correct!";
                document.getElementById('feedbackTitle').style.color = "#4CAF50";
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect";
                document.getElementById('feedbackTitle').style.color = "#f44336";
            }
            
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('maxScore').innerText = questions.length;
            
            const feedback = document.getElementById('resultFeedback');
            const percentage = (score / questions.length) * 100;

            if (percentage === 100) {
                feedback.innerText = "Perfect Score! You're an Ethical Role Model!";
            } else if (percentage >= 80) {
                feedback.innerText = "Excellent! You have a strong grasp of teacher ethics.";
            } else if (percentage >= 50) {
                feedback.innerText = "Good job! Review the Articles to master the guidelines.";
            } else {
                feedback.innerText = "Keep practicing! Professional Ethics is vital for every teacher.";
            }
            const finishAudio = document.getElementById('sound-finish'); if (finishAudio) { finishAudio.currentTime = 0; finishAudio.play().catch(()=>{}); }
            saveResultToFirestore('Code of Ethics for Professional Teachers', score, questions.length);
        }

        startQuiz();
    </script>
</body>
</html>
