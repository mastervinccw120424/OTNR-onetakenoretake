<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - Mathematics Majorship</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Sound effects -->
    <audio id="sound-correct" src="correct.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="wrong.mp3" preload="auto"></audio>
    <audio id="sound-notification" src="notification.mp3" preload="auto"></audio>
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">Mathematics Majorship Comprehensive</h2>
            <div class="quiz-timer" id="quizTimer"></div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;"></div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / <span id="totalQuestions">0</span></p>
            <div id="resultFeedback" class="mb-20">Excellent! Keep on reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="btn-action secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Restart FlashReview
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What is the remainder when f(x) = 2x³ - 5x² + 3x + 7 is divided by x - 2?", options: ["7", "9", "5", "11"], correct: 1, exp: "According to the Remainder Theorem, the remainder of f(x) divided by (x - c) is f(c). Substituting 2: 2(2)³ - 5(2)² + 3(2) + 7 = 16 - 20 + 6 + 7 = 9." },
            { q: "In a circle with radius 10 cm, what is the length of an arc that subtends a central angle of 60°?", options: ["5π/3 cm", "10π/3 cm", "10π cm", "20π cm"], correct: 1, exp: "Arc length formula: s = rθ where θ is in radians. Converting 60° to π/3 radians: 10 × (π/3) = 10π/3 cm." },
            { q: "Which of the following is the derivative of f(x) = ln(x² + 1)?", options: ["1/(x² + 1)", "2x/(x² + 1)", "2x(x² + 1)", "x/(x² + 1)"], correct: 1, exp: "Using the Chain Rule, the derivative of ln(u) is (1/u) × du/dx. Here u = x² + 1 and du/dx = 2x, resulting in 2x/(x² + 1)." },
            { q: "What is the value of the limit lim(x→0) sin(5x)/x?", options: ["0", "1", "5", "Undefined"], correct: 2, exp: "Using the special limit lim(θ→0) sin(aθ)/θ = a, the coefficient of x in the sine function determines the limit. The answer is 5." },
            { q: "If matrix A = [[2, 3], [1, 4]], what is the determinant of A?", options: ["11", "5", "8", "2"], correct: 1, exp: "The determinant of a 2×2 matrix [[a, b], [c, d]] is ad - bc. For this matrix: (2 × 4) - (3 × 1) = 8 - 3 = 5." },
            { q: "How many ways can a committee of 3 be chosen from a group of 7 people?", options: ["21", "35", "210", "42"], correct: 1, exp: "This is a combination problem (nCr). 7C3 = (7 × 6 × 5)/(3 × 2 × 1) = 210/6 = 35." },
            { q: "What is the slope of a line perpendicular to the line 2x - 3y = 6?", options: ["2/3", "-3/2", "3/2", "-2/3"], correct: 1, exp: "The slope of the given line is 2/3. Perpendicular lines have negative reciprocal slopes, so -1/(2/3) = -3/2." },
            { q: "In a standard normal distribution, what percentage of the area falls between z = -1 and z = 1?", options: ["50%", "68%", "95%", "34%"], correct: 1, exp: "The Empirical Rule states that approximately 68% of the data in a normal distribution falls within one standard deviation of the mean." },
            { q: "What is the sum of the interior angles of a convex hexagon?", options: ["360°", "720°", "540°", "900°"], correct: 1, exp: "The formula for the sum of interior angles is (n - 2) × 180°. For a hexagon (n=6): (6 - 2) × 180° = 4 × 180° = 720°." },
            { q: "Find the value of x in the equation 4^(x+1) = 64.", options: ["2", "3", "1", "4"], correct: 0, exp: "Express both sides with the same base: 4^(x+1) = 4^3. Therefore, x + 1 = 3, which means x = 2." },
            { q: "Which property of real numbers is illustrated by a(b + c) = ab + ac?", options: ["Associative", "Commutative", "Distributive", "Identity"], correct: 2, exp: "The Distributive Property allows a factor outside a set of parentheses to be distributed to each term within the parentheses." },
            { q: "What is the center and radius of the circle (x - 3)² + (y + 2)² = 25?", options: ["Center (3, -2), Radius 5", "Center (-3, 2), Radius 5", "Center (3, -2), Radius 25", "Center (-3, 2), Radius 25"], correct: 0, exp: "The standard form is (x-h)² + (y-k)² = r². Here, h=3, k=-2, and r = √25 = 5." },
            { q: "Two fair dice are rolled. What is the probability that the sum of the faces is 7?", options: ["1/12", "1/6", "5/36", "1/36"], correct: 1, exp: "There are 36 possible outcomes. The pairs summing to 7 are: (1,6), (2,5), (3,4), (4,3), (5,2), (6,1). 6/36 = 1/6." },
            { q: "Evaluate the integral ∫(3x² + 2x) dx.", options: ["x³ + x² + C", "6x + 2 + C", "3x³ + 2x² + C", "x³ + 2x² + C"], correct: 0, exp: "Using the Power Rule: ∫3x² dx = x³ and ∫2x dx = x². The result is x³ + x² + C." },
            { q: "If sin θ = 3/5 and θ is in Quadrant II, what is cos θ?", options: ["4/5", "-4/5", "3/4", "-3/4"], correct: 1, exp: "In Quadrant II, cosine is negative. Using sin²θ + cos²θ = 1: (3/5)² + cos²θ = 1 implies cos²θ = 16/25 implies cos θ = -4/5." },
            { q: "What is the nth term of the arithmetic sequence 5, 9, 13, 17...?", options: ["4n + 1", "4n + 5", "5n + 4", "n + 4"], correct: 0, exp: "The formula is aₙ = a₁ + (n-1)d. aₙ = 5 + (n-1)4 = 5 + 4n - 4 = 4n + 1." },
            { q: "A statement that is assumed to be true without proof is a/an:", options: ["Theorem", "Corollary", "Postulate (Axiom)", "Lemma"], correct: 2, exp: "Postulates (or axioms) serve as the starting point of a logical system; theorems are proven based on these postulates." },
            { q: "What is the mode of the following data set: 2, 4, 4, 5, 6, 7, 7, 7, 8?", options: ["4", "5", "7", "6"], correct: 2, exp: "The mode is the most frequent value. '7' appears three times, which is more than any other number." },
            { q: "Solve for x in the inequality |x - 3| < 5.", options: ["x < 8", "-2 < x < 8", "x > -2", "x < -2 or x > 8"], correct: 1, exp: "|x - 3| < 5 translates to -5 < x - 3 < 5. Adding 3 to all parts gives -2 < x < 8." },
            { q: "What is the period of the function y = sin(2x)?", options: ["2π", "π", "π/2", "4π"], correct: 1, exp: "The period of sin(bx) is 2π/|b|. Here b=2, so 2π/2 = π." },
            { q: "In how many ways can 5 people be seated in a round table?", options: ["120", "24", "60", "25"], correct: 1, exp: "For circular permutations, the formula is (n - 1)!. Therefore, (5 - 1)! = 4! = 24." },
            { q: "If 3x + 2y = 12 and x - y = 4, find y.", options: ["4", "0", "2", "-2"], correct: 1, exp: "Using substitution from x = y + 4: 3(y + 4) + 2y = 12 implies 5y + 12 = 12 implies y = 0." },
            { q: "What is the inverse of the function f(x) = 2x - 3?", options: ["f⁻¹(x) = (x + 3)/2", "f⁻¹(x) = (x - 3)/2", "f⁻¹(x) = 2x + 3", "f⁻¹(x) = 3x - 2"], correct: 0, exp: "Swap x and y: x = 2y - 3. Solve for y: x + 3 = 2y implies y = (x + 3)/2." },
            { q: "Which of the following is an irrational number?", options: ["0.333...", "√16", "π", "22/7"], correct: 2, exp: "π is a non-repeating, non-terminating decimal. Options A, B, and D are rational." },
            { q: "A triangle with sides 3, 4, and 5 is a/an:", options: ["Isosceles triangle", "Right triangle", "Equilateral triangle", "Obtuse triangle"], correct: 1, exp: "It satisfies the Pythagorean theorem: 3² + 4² = 5² (9 + 16 = 25)." },
            { q: "What is the greatest common divisor (GCD) of 48 and 180?", options: ["6", "12", "24", "36"], correct: 1, exp: "Prime factors: 48 = 2⁴ × 3; 180 = 2² × 3² × 5. The GCD is 2² × 3 = 12." },
            { q: "Which of the following is the measure of each exterior angle of a regular octagon?", options: ["45°", "60°", "135°", "120°"], correct: 0, exp: "The sum of exterior angles for any polygon is 360°. For an octagon (n=8): 360/8 = 45°." },
            { q: "If the roots of a quadratic equation are 3 and -5, what is the equation?", options: ["x² - 2x - 15 = 0", "x² + 2x - 15 = 0", "x² + 8x + 15 = 0", "x² - 8x + 15 = 0"], correct: 1, exp: "Using (x - r₁)(x - r₂) = 0: (x - 3)(x + 5) = x² + 2x - 15 = 0." },
            { q: "What is the volume of a right circular cone with radius 3 cm and height 7 cm?", options: ["21π cm³", "63π cm³", "7π cm³", "49π cm³"], correct: 0, exp: "V = (1/3)πr²h = (1/3)π(3²)(7) = (1/3)π(9)(7) = 21π cm³." },
            { q: "Evaluate: log₂(32) + log₃(27).", options: ["5", "8", "15", "6"], correct: 1, exp: "log₂(32) = 5 (since 2⁵=32) and log₃(27) = 3 (since 3³=27). 5 + 3 = 8." },
            { q: "In the set {10, 20, 30, 40, 50}, if 50 is replaced by 100, which measure changes the most?", options: ["Median", "Mode", "Mean", "None of these"], correct: 2, exp: "The mean is sensitive to outliers and extreme values. It will change significantly." },
            { q: "What is the value of 10!/8!?", options: ["90", "18", "2", "80"], correct: 0, exp: "10! = 10 × 9 × 8!. Thus 10!/8! = 10 × 9 = 90." },
            { q: "A car travels 120 km in 2 hours. At this rate, how long will it take to travel 300 km?", options: ["4 hours", "5 hours", "6 hours", "4.5 hours"], correct: 1, exp: "Speed = 120/2 = 60 km/h. Time = Distance/Speed = 300/60 = 5 hours." },
            { q: "What is the slope of the line tangent to y = x² at the point (2, 4)?", options: ["2", "4", "1", "0"], correct: 1, exp: "The derivative y' = 2x. At x = 2, the slope m = 2(2) = 4." },
            { q: "If a = 2 and b = -3, what is the value of a² - 2ab + b²?", options: ["1", "25", "5", "13"], correct: 1, exp: "This is (a - b)². Substituting: (2 - (-3))² = (5)² = 25." },
            { q: "How many subsets does a set with 5 elements have?", options: ["10", "25", "32", "16"], correct: 2, exp: "The formula for the number of subsets of a set with n elements is 2ⁿ. 2⁵ = 32." },
            { q: "What is the measure of the supplementary angle of 75°?", options: ["15°", "105°", "25°", "285°"], correct: 1, exp: "Supplementary angles sum to 180°. 180° - 75° = 105°." },
            { q: "A box contains 5 red balls and 3 blue balls. If two balls are drawn with replacement, what is the probability both are red?", options: ["25/64", "5/14", "10/64", "15/56"], correct: 0, exp: "Probability of red is 5/8. With replacement: (5/8) × (5/8) = 25/64." },
            { q: "Simplify: (x⁵y²)/(x²y⁻³)", options: ["x³y⁻¹", "x⁷y⁵", "x³y⁵", "x⁷y⁻¹"], correct: 2, exp: "Using quotient rule: x⁵⁻² = x³ and y²⁻(⁻³) = y⁵. Result: x³y⁵." },
            { q: "What is the sum of the first 10 terms of the arithmetic sequence 2, 4, 6, 8...?", options: ["100", "110", "120", "200"], correct: 1, exp: "Sₙ = (n/2)(2a₁ + (n-1)d). S₁₀ = (10/2)(2(2) + (9)2) = 5(4 + 18) = 110." },
            { q: "What is the domain of the function f(x) = √(x - 4)?", options: ["x < 4", "x > 4", "x ≥ 4", "All real numbers"], correct: 2, exp: "For square roots, the radicand must be ≥ 0. x - 4 ≥ 0 implies x ≥ 4." },
            { q: "The identity element for multiplication is:", options: ["0", "-1", "1", "Does not exist"], correct: 2, exp: "Multiplying any number by 1 results in the same number (a × 1 = a)." },
            { q: "If the area of a square is 64 sq. units, what is its perimeter?", options: ["16", "32", "24", "64"], correct: 1, exp: "Area s² = 64 implies s = 8. Perimeter = 4s = 4(8) = 32." },
            { q: "In logic, a statement that is always true is called a:", options: ["Fallacy", "Contradiction", "Tautology", "Negation"], correct: 2, exp: "A tautology is a compound statement that is true for all possible truth values." },
            { q: "What is the value of cos(0°)?", options: ["0", "1", "Undefined", "0.5"], correct: 1, exp: "On the unit circle, the coordinates at 0° are (1,0). The x-coordinate represents cosine." },
            { q: "The angles of a triangle are in a ratio of 1:2:3. What is the largest angle?", options: ["60°", "90°", "120°", "45°"], correct: 1, exp: "x + 2x + 3x = 180 implies 6x = 180 implies x = 30. Largest angle is 3(30) = 90°." },
            { q: "What is the midpoint of the segment connecting (2, 5) and (8, -1)?", options: ["(5, 2)", "(10, 4)", "(3, 3)", "(5, 3)"], correct: 0, exp: "Midpoint = ((2+8)/2, (5+(-1))/2) = (10/2, 4/2) = (5, 2)." },
            { q: "If 20% of a number is 40, what is the number?", options: ["80", "200", "120", "400"], correct: 1, exp: "0.20x = 40 implies x = 40/0.20 = 200." },
            { q: "Which of the following is a prime number?", options: ["9", "15", "21", "2"], correct: 3, exp: "2 is the only even prime number. 9, 15, and 21 are composite." },
            { q: "Find the limit as x approaches infinity of (2x + 1)/(x - 3).", options: ["1", "0", "2", "Infinity"], correct: 2, exp: "For limits at infinity with equal degrees, the limit is the ratio of leading coefficients (2/1 = 2)." },
            { q: "What is the area of a triangle with base 10 and height 12?", options: ["120", "60", "22", "50"], correct: 1, exp: "Area = (1/2) × base × height = (1/2)(10)(12) = 60." },
            { q: "Which of the following describes the set of integers?", options: ["{1, 2, 3...}", "{...-2, -1, 0, 1, 2...}", "{0, 1, 2...}", "{..., -0.5, 0, 0.5, ...}"], correct: 1, exp: "Integers consist of zero, positive natural numbers, and their negatives." },
            { q: "Convert 3π/2 radians to degrees.", options: ["90°", "180°", "270°", "360°"], correct: 2, exp: "Substitute π with 180°: (3 × 180)/2 = 270°." },
            { q: "What is the length of the hypotenuse of a right triangle with legs 5 and 12?", options: ["13", "17", "7", "25"], correct: 0, exp: "c² = 5² + 12² = 25 + 144 = 169. c = √169 = 13." },
            { q: "If f(x) = x² - 4, find f(3).", options: ["2", "5", "9", "1"], correct: 1, exp: "Plug 3 into x: 3² - 4 = 9 - 4 = 5." },
            { q: "How many vertices does a cube have?", options: ["6", "8", "12", "4"], correct: 1, exp: "A cube has 6 faces, 12 edges, and 8 corner points (vertices)." },
            { q: "What is the coefficient of the third term in the expansion of (x + y)⁴?", options: ["1", "4", "6", "10"], correct: 2, exp: "Using Pascal's triangle for n=4, the coefficients are 1, 4, 6, 4, 1. The third term is 6." },
            { q: "What is the base of the natural logarithm?", options: ["10", "2", "e", "π"], correct: 2, exp: "The natural logarithm 'ln' specifically refers to log base e." },
            { q: "Solve for x: 3(x - 4) = 2x + 5", options: ["9", "17", "12", "1"], correct: 1, exp: "3x - 12 = 2x + 5 implies 3x - 2x = 5 + 12 implies x = 17." },
            { q: "What is the value of i² in complex numbers?", options: ["1", "-1", "√(-1)", "0"], correct: 1, exp: "By definition, i = √(-1), so i² = -1." }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 90;
        let totalTimeUsed = 0;

        // Audio helper (copied from script-firebase-fixed.js for standalone quiz pages)
        function playAudio(id) {
            try {
                const el = document.getElementById(id);
                if (!el) return;
                el.currentTime = 0;
                const p = el.play();
                if (p && p.catch) p.catch(() => {});
            } catch (e) {}
        }
        function startQuiz() { showQuestion(); }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                container.appendChild(btn);
            });
            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            startTimer();
        }

        function startTimer() {
            clearInterval(timer); timeLeft = 90;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--; document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) { clearInterval(timer); selectOption(-1); }
            }, 1000);
        }

        function selectOption(index) {
            clearInterval(timer);
            const timeSpent = 90 - timeLeft;
            totalTimeUsed += timeSpent;
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.disabled = true);
            if (index === q.correct) {
                options[index].classList.add('correct'); score++;
                document.getElementById('feedbackTitle').innerText = "Correct!";
                document.getElementById('feedbackTitle').style.color = "var(--success)";
                playAudio('sound-correct');
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect";
                document.getElementById('feedbackTitle').style.color = "var(--danger)";
                playAudio('sound-wrong');
            }
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) showQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            document.getElementById('finalScore').innerText = score; // Update final score
            document.getElementById('totalQuestions').innerText = questions.length; // Update total questions
        }
        startQuiz();
    </script>
</body>
</html>
