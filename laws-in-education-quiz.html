 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - Laws in Education</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'"> 
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">Laws in Education</h2>
            <div class="quiz-timer" id="quizTimer">60s</div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;">1 / 50</div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i> 
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / <span id="totalQuestions">0</span></p>
            <div id="resultFeedback" class="mb-20">Excellent! Keep on reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'"> <!-- Keep btn-action for primary action -->
                    <i class="fas fa-home"></i> Home 
                </button>
                <button class="btn-action secondary" onclick="location.reload()"> <!-- Keep btn-action secondary for secondary action -->
                    <i class="fas fa-redo"></i> Restart FlashReview 
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Which Philippine law mandates free tuition in state universities and colleges?", options: ["RA 10931", "RA 7722", "RA 9155", "RA 4670"], correct: 0, exp: "RA 10931 is the Universal Access to Quality Tertiary Education Act." },
            { q: "What is the legal basis for the mandatory teaching of Jose Rizal’s life, works, and writings in all Philippine schools?", options: ["Republic Act 1425", "Republic Act 7836", "Republic Act 9155", "Republic Act 10533"], correct: 0, exp: "The Rizal Law was authored by Sen. Claro M. Recto and sponsored by Sen. Jose P. Laurel." },
            { q: "The Magna Carta for Public School Teachers is also known as:", options: ["RA 4670", "RA 7836", "RA 9155", "RA 10533"], correct: 0, exp: "RA 4670 is the Magna Carta for Public School Teachers." },
            { q: "Which law established the Commission on Higher Education (CHED)?", options: ["RA 7722", "RA 7796", "RA 9155", "RA 4670"], correct: 0, exp: "RA 7722 is the Higher Education Act of 1994." },
            { q: "What does RA 9155 primarily address?", options: ["Professionalization of teachers.", "Higher education standards.", "Governance of basic education (School-Based Management).", "Rights of persons with disabilities."], correct: 2, exp: "RA 9155 is the Governance of Basic Education Act of 2001." },
            { q: "Which legal mandate in the Philippines is known as the \"Magna Carta for Disabled Persons\"?", options: ["Republic Act 9155", "Republic Act 7277", "Republic Act 10533", "Republic Act 7836"], correct: 1, exp: "RA 7277 is the Magna Carta for Disabled Persons, providing for their rehabilitation, self-development, and self-reliance." },
            { q: "This law, passed in 2013, expanded the basic education to include Kindergarten and two additional years of high school.", options: ["RA 7722", "RA 10533", "RA 9155", "RA 7836"], correct: 1, exp: "RA 10533 is the Enhanced Basic Education Act of 2013." },
            { q: "Which law mandates the establishment of an Inclusive Learning Resource Center (ILRC) in every municipality and city?", options: ["RA 11650", "RA 7836", "RA 4670", "RA 9155"], correct: 0, exp: "RA 11650 (2022) strengthens inclusion for learners with disabilities." },
            { q: "Which law declares Filipino Sign Language (FSL) as the national sign language of the Filipino deaf?", options: ["RA 11106", "RA 7277", "RA 10533", "RA 4670"], correct: 0, exp: "RA 11106 is the Filipino Sign Language Act." },
            { q: "What is the primary purpose of RA 7836, also known as the Philippine Teachers Professionalization Act of 1994?", options: ["To provide free education.", "To regulate the practice of teaching in the Philippines.", "To establish new schools.", "To fund educational research."], correct: 1, exp: "RA 7836 professionalizes teaching by requiring licensure." },
            { q: "Which law created the Technical Education and Skills Development Authority (TESDA)?", options: ["RA 7796", "RA 7722", "RA 9155", "RA 4670"], correct: 0, exp: "RA 7796 is the TESDA Act of 1994." },
            { q: "What is the legal basis for the implementation of the Mother Tongue-Based Multilingual Education (MTB-MLE) in the K-12 curriculum?", options: ["RA 10533", "RA 7277", "RA 9155", "RA 4670"], correct: 0, exp: "RA 10533 (K-12 Law) mandates MTB-MLE." },
            { q: "Which law protects children from all forms of abuse, neglect, cruelty, exploitation, and discrimination?", options: ["RA 7610", "RA 9262", "RA 8371", "RA 9710"], correct: 0, exp: "RA 7610 is the Special Protection of Children Against Child Abuse, Exploitation and Discrimination Act." },
            { q: "Which law provides for the establishment and maintenance of an integrated system of education in the Philippines?", options: ["BP 232 (Education Act of 1982)", "RA 7836", "RA 9155", "RA 10533"], correct: 0, exp: "BP 232 is a comprehensive law on the Philippine education system." },
            { q: "What is the legal age of criminal responsibility in the Philippines, as amended by RA 10630?", options: ["9 years old", "12 years old", "15 years old", "18 years old"], correct: 2, exp: "RA 10630 amended RA 9344, setting the age at 15." },
            { q: "Which law is known as the \"Anti-Bullying Act of 2013\"?", options: ["RA 10627", "RA 9262", "RA 7610", "RA 9710"], correct: 0, exp: "RA 10627 requires all elementary and secondary schools to adopt policies to prevent and address bullying." },
            { q: "Which law provides for the recognition, protection, and promotion of the rights of Indigenous Cultural Communities/Indigenous Peoples (ICCs/IPs)?", options: ["RA 8371 (IPRA Law)", "RA 7277", "RA 10533", "RA 9155"], correct: 0, exp: "RA 8371 is the Indigenous Peoples' Rights Act of 1997." },
            { q: "What is the primary goal of the \"Gender and Development (GAD) Act\" (RA 9710 or Magna Carta of Women)?", options: ["To promote women's beauty pageants.", "To eliminate discrimination against women and recognize, protect, fulfill, and promote the rights of Filipino women.", "To encourage men to stay at home.", "To provide free education for women only."], correct: 1, exp: "RA 9710 aims to empower women and ensure gender equality." },
            { q: "Which law mandates the inclusion of environmental education in the school curricula?", options: ["RA 9512 (Environmental Awareness and Education Act)", "RA 9003", "RA 8749", "RA 9275"], correct: 0, exp: "RA 9512 promotes environmental literacy among Filipinos." },
            { q: "What is the main objective of RA 9003, or the \"Ecological Solid Waste Management Act of 2000\"?", options: ["To promote burning of garbage.", "To ensure the proper segregation, collection, transport, storage, treatment, and disposal of solid waste.", "To encourage littering.", "To ban all plastic products."], correct: 1, exp: "RA 9003 provides a systematic, comprehensive, and ecological solid waste management program." },
            { q: "What does RA 9275, or the \"Philippine Clean Water Act of 2004,\" primarily aim to do?", options: ["To regulate the use of bottled water.", "To protect the country's water bodies from pollution.", "To promote swimming in rivers.", "To ban all fishing activities."], correct: 1, exp: "RA 9275 aims to protect, preserve, and revive the quality of the country's fresh, brackish, and marine waters." },
            { q: "Which law mandates the provision of free public secondary education?", options: ["RA 6655 (Free Public Secondary Education Act of 1988)", "RA 10533", "RA 9155", "RA 4670"], correct: 0, exp: "RA 6655 made secondary education free in public schools." },
            { q: "What is the primary purpose of the \"Anti-Hazing Act of 2018\" (RA 11053)?", options: ["To promote hazing in fraternities.", "To prohibit hazing and regulate other forms of initiation rites of fraternities, sororities, and other organizations.", "To legalize all forms of initiation.", "To allow hazing with parental consent."], correct: 1, exp: "RA 11053 strengthens the prohibition of hazing." },
            { q: "What is the main objective of the \"Anti-Sexual Harassment Act of 1995\" (RA 7877)?", options: ["To promote sexual harassment.", "To protect individuals from sexual harassment in employment, education, or training environment.", "To legalize sexual relationships in schools.", "To ban all forms of physical contact."], correct: 1, exp: "RA 7877 defines and penalizes sexual harassment." },
            { q: "Which law outlines the proper use and respect for the national flag and heraldic items?", options: ["RA 4670", "RA 8491", "RA 10121", "EO 200"], correct: 1, exp: "RA 8491 outlines the proper use and respect for the national flag and heraldic items." },
            { q: "What does RA 10121 deal with?", options: ["Information Technology integration", "Disaster Risk Reduction and Management (DRRM)", "Anti-Red Tape", "Senior Citizens' rights"], correct: 1, exp: "RA 10121, approved in May 2010, focuses on disaster risk management." },
            { q: "According to RA 7797, a school year must have at least how many days?", options: ["180 days", "200 days", "220 days", "250 days"], correct: 1, exp: "RA 7797 lengthens the school program to a minimum of 200 days but not more than 220 days." },
            { q: "Which law established the \"Centers of Excellence\" for teacher education?", options: ["RA 7722", "RA 7784", "RA 7836", "RA 9155"], correct: 1, exp: "RA 7784 is the law that established Centers of Excellence in the Philippines." },
            { q: "Which law granted \"Civil Service Eligibility\" to government employees under provisional status who rendered 7 years of efficient service?", options: ["RA 1079", "RA 6850", "RA 9485", "RA 6713"], correct: 1, exp: "RA 6850 grants eligibility to long-serving temporary employees under specific conditions." },
            { q: "Which Republic Act is the \"Anti-Red Tape Act\"?", options: ["RA 9155", "RA 9485", "RA 10533", "RA 7877"], correct: 1, exp: "RA 9485 is known as the Anti-Red Tape Act." },
            { q: "Which law focuses on the welfare of persons with disabilities?", options: ["RA 7277", "RA 9994", "RA 9262", "RA 7610"], correct: 0, exp: "RA 7277 provides for the rehabilitation and self-reliance of disabled persons." },
            { q: "What is the focus of RA 9994?", options: ["Special Education", "Expanded Senior Citizens Act", "Anti-Hazing", "Human Rights"], correct: 1, exp: "RA 9994 expanded the benefits and privileges of senior citizens." },
            { q: "Which law integrates Drug Prevention and Control into the intermediate and secondary curricula?", options: ["RA 9163", "RA 7624", "RA 8190", "RA 10121"], correct: 1, exp: "RA 7624 mandates the integration of drug education in schools." },
            { q: "Which Republic Act integrated \"Information Technology\" into public school curricula?", options: ["RA 9155", "RA 90210", "RA 10533", "RA 7836"], correct: 1, exp: "RA 90210 provides for the integration of IT into elementary and secondary education." },
            { q: "Which law gives priority to residents of the barangay where a school is located for teacher appointments?", options: ["RA 4670", "RA 8190", "RA 9155", "RA 6972"], correct: 1, exp: "RA 8190 grants priority in appointment to qualified residents of the immediate school community." },
            { q: "Which law established a \"Day Care Center\" for every barangay?", options: ["RA 6972", "RA 7743", "RA 10533", "RA 9155"], correct: 0, exp: "RA 6972 is the law mandating Day Care Centers in every barangay." },
            { q: "Presidential Decree No. 451 gave the Secretary of Education the power to do what?", options: ["Professionalize teachers", "Regulate tuition fees in private schools", "Change the school calendar", "Abolish board exams"], correct: 1, exp: "PD 451 authorized the regulation of tuition and other fees in private educational institutions." },
            { q: "Which law established the \"Board of Textbooks\" to approve books for public schools?", options: ["RA 1425", "RA 137", "RA 1079", "RA 1265"], correct: 1, exp: "Republic Act No. 137 established the Board of Textbooks to regulate instructional materials." },
            { q: "Which law requires the observance of the \"Flag Ceremony\" in all schools?", options: ["RA 8491", "RA 1265", "EO 27", "EO 200"], correct: 1, exp: "RA 1265 is the specific law regarding the observance of daily flag ceremonies." },
            { q: "Presidential Decree No. 1139 created a position for which specific area of education?", options: ["Special Education", "Non-Formal Education", "Higher Education", "Vocational Education"], correct: 1, exp: "PD 1139 created the position of Undersecretary for Non-Formal Education." },
            { q: "Which law allows public secondary school teachers to be under the administrative supervision of the DECS (now DepEd)?", options: ["EO 189", "EO 27", "PD 688", "RA 9155"], correct: 0, exp: "EO 189 placed public secondary school teachers under the control of the central education department." },
            { q: "Which law requires schools to provide \"Medical and Dental Services\" to students?", options: ["Civil Code Article 349", "RA 1054", "RA 7610", "PD 6-A"], correct: 1, exp: "RA 1054, as amended, mandates that educational institutions provide health services." },
            { q: "Which Manual of Regulation requires private schools to have a \"fixed calendar\"?", options: ["1992 Manual of Regulation (Sec 48-49)", "1992 Manual of Regulation (Sec 44-47)", "Education Act of 1982", "RA 7797"], correct: 0, exp: "Sections 48-49 of the 1992 Manual for Private Schools mandate the use of a fixed school calendar." },
            { q: "According to Article XIV, Sec 5:2 of the 1987 Constitution, what is recognized in all institutions of higher learning?", options: ["Shared Governance", "Academic Freedom", "Bilingual Education", "Professional Advancement"], correct: 1, exp: "The Constitution explicitly protects academic freedom in higher education institutions." },
            { q: "Which law prohibits fund-raising in schools?", options: ["RA 1265", "EO 200, Sec 3", "RA 8491", "1987 Constitution"], correct: 1, exp: "EO 200 contains the specific provision prohibiting unauthorized fund-raising in schools." },
            { q: "Which law provides for \"Bilingual Education,\" using English and Filipino as separate media of instruction?", options: ["MEC Order No. 22, s. 1978", "Department Order No. 25, s. 1974", "Department Order No. 1, s. 1973", "1987 Constitution"], correct: 1, exp: "Department Order No. 25, s. 1974 implemented the Bilingual Education Program." },
            { q: "Which law required all graduating grade six pupils to take the National Elementary Achievement Test (NEAT)?", options: ["DECS Order No. 30, s. 1993", "DECS Order No. 38, s. 1994", "MEC Order No. 22, s. 1978", "PD 146"], correct: 0, exp: "DECS Order 30, s. 1993 established the NEAT for grade six students." },
            { q: "Which law prohibits the publication of \"Immoral Doctrine\" or obscene exhibits in school campuses?", options: ["RA 7877", "Revised Penal Code Article 201", "Article 357", "EO 27"], correct: 1, exp: "The Revised Penal Code prohibits immoral and obscene publications." },
            { q: "Which law protects women against violence?", options: ["RA 7610", "RA 9262", "RA 7877", "RA 8049"], correct: 1, exp: "RA 9262 is the Anti-Violence Against Women and Their Children Act." },
            { q: "Which law sets the rule for the cancellation of classes due to typhoons and calamities?", options: ["RA 10121", "EO 66", "PD 6-A", "RA 9155"], correct: 1, exp: "EO 66 contains the rules for class cancellations during natural disasters." }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 60;
        let totalTimeUsed = 0;

        function startQuiz() { showQuestion(); }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const container = document.getElementById('quizOptions');
            container.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                container.appendChild(btn);
            });
            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            startTimer();
        }

        function startTimer() {
            clearInterval(timer); timeLeft = 60;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--; document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) { clearInterval(timer); selectOption(-1); }
            }, 1000);
        }

        function playSound(file) {
            if (localStorage.getItem('isMuted') === 'true') return;
            const audio = new Audio(file);
            audio.play().catch(e => {});
        }

        function selectOption(index) {
            clearInterval(timer);
            const timeSpent = 60 - timeLeft;
            totalTimeUsed += timeSpent;
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            options.forEach(btn => btn.disabled = true);
            if (index === q.correct) {
                options[index].classList.add('correct'); score++;
                document.getElementById('feedbackTitle').innerText = "Correct!";
                document.getElementById('feedbackTitle').style.color = "#4CAF50";
                playSound('correct.mp3');
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect";
                document.getElementById('feedbackTitle').style.color = "#f44336";
                playSound('wrong.mp3');
            }
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) showQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            
            const finalScoreEl = document.getElementById('finalScore');
            const totalQuestionsEl = document.getElementById('totalQuestions');
            const total = questions.length;
            totalQuestionsEl.innerText = total;

            playSound('finish.mp3');

            let current = 0;
            if (score > 0) {
                const timer = setInterval(() => {
                    current++;
                    finalScoreEl.innerText = current;
                    if (current >= score) clearInterval(timer);
                }, Math.max(20, 1000 / score));
            } else {
                finalScoreEl.innerText = "0";
            }

            const percentage = Math.round((score / total) * 100);
            const feedback = document.getElementById('resultFeedback');

            if (percentage >= 75) {
                feedback.innerHTML = `<span class="result-percentage score-excellent">${percentage}% - Passed</span>Excellent! Your knowledge of educational mandates and legal bases is outstanding.`;
            } else {
                feedback.innerHTML = `<span class="result-percentage score-poor">${percentage}% - Failed</span>Consistency is key. Focus on the specific Republic Acts to strengthen your foundation.`;
            }

            saveResult(totalTimeUsed);
        }
        startQuiz();
    </script>
</body>
</html>
