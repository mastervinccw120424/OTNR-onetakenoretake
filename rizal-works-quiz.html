<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - Life and Works of Rizal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">Life and Works of Rizal</h2>
            <div class="quiz-timer" id="quizTimer">60s</div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;">1 / 15</div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / 15</p>
            <div id="resultFeedback" class="mb-20">Great job! Keep reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="btn-action secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Restart FlashReview
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What is the legal basis for the mandatory teaching of Jose Rizal’s life, works, and writings in all Philippine schools?", options: ["Republic Act 1425", "Republic Act 7836", "Republic Act 9155", "Republic Act 10533"], correct: 0, exp: "The Rizal Law was authored by Sen. Claro M. Recto and sponsored by Sen. Jose P. Laurel." },
            { q: "Jose Rizal was born in Calamba, Laguna on June 19, 1861. Who was his first teacher?", options: ["Leon Monroy", "Justiniano Aquino Cruz", "His mother, Teodora Alonzo", "Father Sanchez"], correct: 2, exp: "His mother taught him the alphabet and the prayers at the age of three." },
            { q: "Which of the following is the true reason why the Mercado family used the surname \"Rizal\"?", options: ["It was given by a Spanish commander.", "It was chosen from a list provided by Governor-General Narciso Claveria in 1849.", "It means \"market\" in Spanish.", "It was the name of their family’s hometown in Spain."], correct: 1, exp: "The Claveria Decree of 1849 mandated Filipinos to adopt Spanish surnames for taxation and census purposes." },
            { q: "What was Rizal’s first poem, written at the age of eight, which emphasized the importance of one’s native tongue?", options: ["A La Juventud Filipina", "Mi Primera Inspiracion", "Sa Aking Mga Kabata", "Mi Ultimo Adios"], correct: 2, exp: "It contains the famous line about loving one's own language." },
            { q: "Rizal entered the Ateneo Municipal de Manila and belonged to the \"Carthaginian Empire.\" What did this empire represent?", options: ["The students living inside the school (boarders).", "The students living outside the school (non-boarders).", "The group of students with the highest grades.", "The group of students specializing in Science."], correct: 1, exp: "The \"Roman Empire\" consisted of boarders/internos, while the \"Carthaginian Empire\" consisted of non-boarders/externos." },
            { q: "Which literary work of Rizal won first prize in a contest in 1879 and was the first to openly refer to the Philippines as his \"Fatherland\"?", options: ["Noli Me Tangere", "A La Juventud Filipina (To the Filipino Youth)", "Junto Al Pasig", "El Consejo de los Dioses"], correct: 1, exp: "In this poem, he called the youth \"The Fair Hope of the Fatherland.\"" },
            { q: "Why did Rizal shift from Philosophy and Letters to Medicine (Ophthalmology) at the University of Santo Tomas?", options: ["He wanted to be a famous surgeon.", "He wanted to cure his mother’s failing eyesight.", "His father forced him to be a doctor.", "He was bored with Philosophy."], correct: 1, exp: "His mother was suffering from cataracts." },
            { q: "The novel \"Noli Me Tangere\" was published in 1887 in Berlin, Germany. Who was the savior of the Noli who loaned Rizal the money for printing?", options: ["Valentin Ventura", "Maximo Viola", "Ferdinand Blumentritt", "Marcelo H. Del Pilar"], correct: 1, exp: "Maximo Viola loaned him 300 pesos for 2,000 copies." },
            { q: "What is the English translation of the Latin phrase \"Noli Me Tangere\"?", options: ["The Reign of Greed", "Touch Me Not", "My Last Farewell", "To the Flowers of Heidelberg"], correct: 1, exp: "It was taken from the Gospel of St. John in the Bible." },
            { q: "In the \"Noli Me Tangere,\" which character represents the idealistic reformist Filipino who returned from Europe?", options: ["Elias", "Crisostomo Ibarra", "Padre Damaso", "Kapitan Tiago"], correct: 1, exp: "Ibarra is the protagonist who sought change through education." },
            { q: "Rizal's second novel, \"El Filibusterismo,\" was dedicated to:", options: ["The Filipino Youth", "His parents", "The GOMBURZA (Martyred Priests)", "Josephine Bracken"], correct: 2, exp: "The execution of Gomez, Burgos, and Zamora in 1872 was a turning point in Rizal's life." },
            { q: "Who was the \"Savior of El Filibusterismo\" who provided the funds to finish its printing in Ghent, Belgium?", options: ["Maximo Viola", "Valentin Ventura", "Juan Luna", "Mariano Ponce"], correct: 1, exp: "Ventura sent the necessary funds when Rizal was almost giving up on the second novel." },
            { q: "In 1892, Rizal founded a civic organization aimed at uniting the archipelago into one compact and homogenous body. What was it called?", options: ["Katipunan", "La Liga Filipina", "Propaganda Movement", "Circulo Hispano-Filipino"], correct: 1, exp: "It was a peaceful organization founded in Tondo, Manila." },
            { q: "Where was Rizal exiled for four years (1892–1896) before his execution?", options: ["Dapitan, Zamboanga del Norte", "Fort Santiago, Manila", "Bagumbayan", "Montjuich, Spain"], correct: 0, exp: "While in Dapitan, he practiced medicine, taught local boys, and engaged in agriculture/engineering." },
            { q: "On December 30, 1896, Rizal was executed by firing squad in Bagumbayan. What were his final words?", options: ["\"Viva Filipinas!\"", "\"Consummatum Est!\"", "\"Morir es descansar.\"", "\"I shall return.\""], correct: 1, exp: "\"It is finished.\"" }
        ];
        const newQuestions = [ // Starting from question 16
            { q: "Who was Rizal’s best friend and a Czech scholar with whom he maintained a long-standing correspondence?", options: ["Valentin Ventura", "Ferdinand Blumentritt", "Maximo Viola", "Antonio Luna"], correct: 1, exp: "Ferdinand Blumentritt was Rizal’s closest confidant. Though they only met in person briefly, they exchanged hundreds of letters discussing Philippine history, culture, and politics." },
            { q: "What was the name of the poem Rizal wrote while in Dapitan for his students, describing his peaceful life as an exile?", options: ["Mi Retiro", "Amor Patrio", "A Las Flores de Heidelberg", "Canto del Viajero"], correct: 0, exp: "Mi Retiro (My Retreat) was written in 1895 at the request of his mother. It beautifully describes his serene life and his house by the sea in Talisay, Dapitan." },
            { q: "Who was the woman known as Rizal’s \"true love\" and inspiration for the character Maria Clara in his novels?", options: ["Segunda Katigbak", "Leonor Rivera", "Gertrude Beckett", "Nellie Boustead"], correct: 1, exp: "Leonor Rivera and Rizal were engaged for 11 years. Her marriage to Henry Kipping and her subsequent death deeply affected Rizal and influenced the tragic fate of Maria Clara." },
            { q: "What was the primary goal of the Propaganda Movement, of which Rizal was a leading figure?", options: ["To start an immediate bloody revolution against Spain.", "To seek assimilation and make the Philippines a province of Spain.", "To crown Rizal as the King of the Philippines.", "To surrender to the Spanish friars."], correct: 1, exp: "The Propaganda Movement sought peaceful reforms, specifically \"assimilation,\" which meant Filipinos would have the same rights as Spaniards and representation in the Spanish Cortes." },
            { q: "Which essay of Rizal predicted that the Philippines would eventually gain independence from Spain but might fall under the influence of the United States?", options: ["The Indolence of the Filipinos", "The Philippines a Century Hence", "Letter to the Young Women of Malolos", "To the Flowers of Heidelberg"], correct: 1, exp: "In \"The Philippines a Century Hence\" (Filipinas dentro de cien años), Rizal analyzed the future of the country and accurately foresaw the intervention of America." },
            { q: "Rizal’s poem \"A La Juventud Filipina\" (To the Filipino Youth) is famous for what iconic phrase?", options: ["\"The Fair Hope of my Fatherland\"", "\"To die is to rest\"", "\"It is finished\"", "\"Love of country is never forgotten\""], correct: 0, exp: "Rizal referred to the youth as the Bella Esperanza de la Patria Mia (The Fair Hope of my Fatherland), urging them to use their talents for the glory of the nation." },
            { q: "In his essay \"The Indolence of the Filipinos,\" what did Rizal cite as the main reason for the perceived \"laziness\" of his countrymen?", options: ["The tropical climate.", "Natural laziness of the Filipino people.", "The abuses of the Spanish government and lack of incentives for labor.", "High wages provided by the friars."], correct: 2, exp: "Rizal argued that indolence was a \"malady\" caused by the Spanish colonial policies, such as forced labor (polo y servicios) and the gambling culture introduced by the colonizers." },
            { q: "Who was the Irishwoman Rizal lived with in Dapitan and eventually married (canonically or by common law) before his execution?", options: ["O-Sei-San", "Suzanne Jacoby", "Josephine Bracken", "Leonor Valenzuela"], correct: 2, exp: "Josephine Bracken came to Dapitan for the eye treatment of her adoptive father. She stayed with Rizal until his final moments at Bagumbayan." },
            { q: "What was the secret mission Rizal went to Europe for in 1882?", options: ["To study the different cultures and laws of European nations to prepare for Philippine liberation.", "To find a European bride.", "To hide from the Katipunan.", "To work as an apprentice for a famous painter."], correct: 0, exp: "His Secret Mission was to observe the life, culture, and laws of European countries to use that knowledge in seeking reforms for the Philippines." },
            { q: "Which character in El Filibusterismo is a wealthy jeweler who is actually a disguised and vengeful Crisostomo Ibarra?", options: ["Basilio", "Isagani", "Simoun", "Padre Florentino"], correct: 2, exp: "Simoun represents the radicalized Ibarra who returned to the Philippines to plot a revolution by infiltrating the highest levels of the Spanish government." },
            { q: "Why did Rizal choose to practice medicine specifically as an Ophthalmologist?", options: ["To prove that Filipinos are smart.", "To cure his mother's cataracts.", "Because it was the highest-paying job at the time.", "He was afraid of blood and preferred eyes."], correct: 1, exp: "His mother, Teodora Alonzo, was going blind. Rizal successfully operated on her eyes twice, once in Hong Kong and once in Dapitan." },
            { q: "What was the newspaper of the Filipino reformists in Spain where Rizal published several of his articles?", options: ["La Solidaridad", "Diariong Tagalog", "El Renacimiento", "Kalayaan"], correct: 0, exp: "La Solidaridad was the official organ of the Propaganda Movement, established by Graciano Lopez Jaena in Barcelona." },
            { q: "To whom did Rizal write a letter praising their courage in establishing a night school to learn Spanish against the friars' wishes?", options: ["The Women of Malolos", "The Youth of Calamba", "The Katipuneros of Tondo", "The Mothers of Manila"], correct: 0, exp: "In his Letter to the Women of Malolos, Rizal emphasized the role of women in nation-building and the importance of education." },
            { q: "What was the name of Rizal’s pet dog that he loved during his childhood in Calamba?", options: ["Usman", "Berganza", "Alipato", "Tagalog"], correct: 0, exp: "Usman was Rizal's faithful black dog. He also had a pony named Alipato." },
            { q: "In Dapitan, Rizal discovered several species of animals. Which of the following is NOT named after him?", options: ["Apogonia rizali (beetle)", "Draco rizali (flying lizard)", "Rhacophorus rizali (frog)", "Felis rizali (cat)"], correct: 3, exp: "Rizal was a prolific naturalist; he sent specimens to Europe, and the beetle, lizard, and frog were indeed named in his honor." },
            { q: "Who was the Spanish Governor-General who signed Rizal’s death warrant?", options: ["Camilo de Polavieja", "Eulogio Despujol", "Ramon Blanco", "Narciso Claveria"], correct: 0, exp: "Governor-General Camilo de Polavieja was known for his \"iron fist\" policy and finalized the execution sentence for Rizal." },
            { q: "What was the name of the ship that brought Rizal to Spain in 1882?", options: ["Salvadora", "SS Cebu", "Victoria", "España"], correct: 0, exp: "Rizal left the Philippines for the first time on the SS Salvadora using a passport with the name \"Jose Mercado.\"" },
            { q: "Rizal excelled in many fields. What is the term for a person like him who has wide-ranging knowledge or learning?", options: ["Philosopher", "Polyglot", "Polymath", "Philanthropist"], correct: 2, exp: "A Polymath is a person whose expertise spans a significant number of different subject areas (Rizal was a doctor, novelist, poet, sculptor, linguist, etc.)." },
            { q: "In the Noli Me Tangere, who represents the simple Filipino who sacrificed his life for Ibarra?", options: ["Elias", "Tasio", "Lucas", "Tarsilo"], correct: 0, exp: "Elias is the noble character who represents the common people (the masa) and believes in revolution as a last resort." },
            { q: "What was Rizal’s first travel destination when he arrived in Europe?", options: ["Madrid, Spain", "Paris, France", "Barcelona, Spain", "Berlin, Germany"], correct: 2, exp: "Rizal first arrived in Barcelona via train from Marseilles before eventually moving to Madrid to study." },
            { q: "Who was Rizal’s first love whom he met when he was a student at Ateneo?", options: ["Leonor Rivera", "Segunda Katigbak", "Consuelo Ortiga", "Gertrude Beckett"], correct: 1, exp: "Segunda Katigbak was a 14-year-old Batangueña. It was a \"love at first sight,\" but she was already engaged to another man." },
            { q: "What was the \"Circular Reals\" or the Diariong Tagalog contribution of Rizal that spoke about his love for the country?", options: ["Amor Patrio", "Me Piden Versos", "A La Juventud Filipina", "Filipinas Dentro de Cien Años"], correct: 0, exp: "Amor Patrio (Love of Country) was the first article Rizal wrote on Spanish soil, emphasizing that the love of country is never extinguished." },
            { q: "Which Filipino priest and mentor influenced Rizal’s views on secularization and nationalism?", options: ["Father Jose Burgos", "Father Mariano Gomez", "Father Jacinto Zamora", "Father Vicente Garcia"], correct: 0, exp: "Father Jose Burgos was a close friend of Rizal’s brother, Paciano. His execution inspired Rizal to dedicate his life to the country's redemption." },
            { q: "Rizal’s annotation of Antonio de Morga’s book was intended to:", options: ["Prove that Filipinos had a rich culture before the Spaniards arrived.", "Learn how to sail.", "Translate Spanish into Tagalog.", "Correct Morga's spelling."], correct: 0, exp: "Rizal annotated the Sucesos de las Islas Filipinas to show that Filipinos were already civilized and had their own history before colonization." },
            { q: "What was the name of the school Rizal established in Dapitan?", options: ["Colegio de San Jose", "Talisay School", "Academia de Dibujo", "Escuela de Artes y Oficios"], correct: 1, exp: "He taught 16 local boys in his home in Talisay, teaching them languages, mathematics, martial arts, and agriculture." },
            { q: "In El Filibusterismo, Simoun’s revolution failed because of:", options: ["Lack of weapons.", "His love for Maria Clara (Basilio's intervention).", "The Spanish army was too strong.", "The people did not want to fight."], correct: 1, exp: "Simoun hesitated when he heard Maria Clara had died, and the ultimate plot (the lamp bomb) was foiled when Isagani threw it into the river to save Paulita Gomez." },
            { q: "What was the name of the organization Rizal joined in Madrid which was composed of Filipinos and Spaniards who wanted reforms?", options: ["Circulo Hispano-Filipino", "La Liga Filipina", "Katipunan", "Masonry"], correct: 0, exp: "The Circulo Hispano-Filipino was a short-lived group where Rizal wrote the poem \"Me Piden Versos\" (They Ask Me for Verses)." },
            { q: "Rizal was a \"Mason.\" What was his Masonic name?", options: ["Dimasalang", "Laong Laan", "May Pag-asa", "Agapito Bagumbayan"], correct: 0, exp: "Dimasalang (Untouchable) was his name in Masonry, while Laong Laan (Ever Prepared) was his pen name in La Solidaridad." },
            { q: "Who was the Spanish Governor-General who ordered Rizal’s arrest and exile to Dapitan?", options: ["Eulogio Despujol", "Ramon Blanco", "Valeriano Weyler", "Primo de Rivera"], correct: 0, exp: "Governor-General Despujol ordered the exile after allegedly finding \"anti-friar leaflets\" in Rizal’s sister's luggage." },
            { q: "What was the title of Rizal’s unfinished third novel, written in Tagalog?", options: ["Makamisa", "Tagalog Nobility", "Sa Mga Pilipino", "Ang Dalawang Magkapatid"], correct: 0, exp: "Makamisa is the most famous of Rizal's unfinished works. It was written in a humorous and satirical Tagalog style." },
            { q: "Which relative of Rizal traveled with him to Spain and was his constant source of financial and moral support?", options: ["Paciano Rizal", "Saturnina Rizal", "Francisco Mercado", "Silvestre Ubaldo"], correct: 0, exp: "His elder brother Paciano was Rizal's \"second father\" and the one who made sure Jose could finish his studies in Europe." },
            { q: "Rizal stayed in London to annotate Morga's book. Whose house did he stay in where he had a romance with Gertrude Beckett?", options: ["The Beckett family", "The Boustead family", "The Viola family", "The Luna family"], correct: 0, exp: "Gertrude Beckett (Gettie) fell in love with Rizal while he was a boarder in their home in London, but Rizal left for Paris to avoid the relationship." },
            { q: "Why was Rizal’s execution considered the \"spark\" of the Philippine Revolution?", options: ["Because he told Bonifacio to attack.", "Because his death turned him into a martyr and unified Filipino sentiments against Spain.", "Because he left a map to Spanish treasures.", "Because he was a general in the army."], correct: 1, exp: "Rizal’s death proved that peaceful reform was no longer possible, forcing Filipinos to realize that only a Revolution could bring freedom." },
            { q: "What is the name of the park where Rizal was executed, now known as Rizal Park?", options: ["Luneta", "Intramuros", "Escolta", "Paco Park"], correct: 0, exp: "Luneta was also called Bagumbayan. It has since been renamed Rizal Park in his honor." },
            { q: "How many languages did Rizal reportedly know how to speak or understand?", options: ["5", "10", "22", "50"], correct: 2, exp: "Rizal was a famous Polyglot; he mastered 22 languages, including Tagalog, Spanish, Latin, Greek, German, French, English, and even Japanese and Arabic." }
        ]; // End of new questions
        questions.push(...newQuestions);
        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 60;

        function startQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 60;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    selectOption(-1); 
                }
            }, 1000);
        }

        function selectOption(index) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(btn => btn.disabled = true);
            
            if (index === q.correct) {
                options[index].classList.add('correct');
                score++;
                document.getElementById('feedbackTitle').innerText = "Correct!";
                document.getElementById('feedbackTitle').style.color = "#4CAF50";
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect";
                document.getElementById('feedbackTitle').style.color = "#f44336";
            }
            
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            document.getElementById('finalScore').innerText = score;
            
            const feedback = document.getElementById('resultFeedback');            
            if (score === questions.length) {
                feedback.innerText = "Perfect Score! You are a true Rizalist!";
            } else if (score >= 12) {
                feedback.innerText = "Excellent! You have a great understanding of our national hero.";
            } else if (score >= 8) {
                feedback.innerText = "Good job! Review the explanations to master the details.";
            } else {
                feedback.innerText = "Keep practicing! Rizal's life is full of lessons.";
            }
        }

        startQuiz();
    </script>
</body>
</html>
