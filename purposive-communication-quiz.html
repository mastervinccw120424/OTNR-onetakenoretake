<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - Purposive Communication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Sound effects -->
    <audio id="sound-correct" src="correct.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="wrong.mp3" preload="auto"></audio>
    <audio id="sound-notification" src="notification.mp3" preload="auto"></audio>
    <audio id="sound-finish" src="finish.mp3" preload="auto"></audio>

    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script defer src="firebase-config.js"></script>
    <script defer src="quiz-save-helper.js"></script>
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">Purposive Communication</h2>
            <div class="quiz-timer" id="quizTimer">60s</div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;">1 / 50</div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / 50</p>
            <div id="resultFeedback" class="mb-20">Great job! Keep reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="btn-action secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Restart FlashReview
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Which model of communication depicts a one-way process where the sender transmits a message to a receiver without immediate feedback?", options: ["Transactional Model", "Interactive Model", "Linear Model", "Helical Model"], correct: 2, exp: "Examples include radio broadcasts or speeches where no immediate reply occurs." },
            { q: "What is the term for the set of shared attitudes, values, goals, and practices that characterizes an institution or organization?", options: ["Globalization", "Culture", "Ethics", "Diversity"], correct: 1, exp: "Culture dictates how people within a group communicate and interpret messages." },
            { q: "In the context of globalization, what is \"Intercultural Communication\"?", options: ["Communicating within one's own family.", "Communication between people from different cultural backgrounds.", "The study of ancient languages.", "Communicating through social media only."], correct: 1, exp: "It requires awareness of cultural differences to avoid misunderstandings." },
            { q: "Which \"C\" of communication refers to using specific facts and figures rather than vague language?", options: ["Conciseness", "Concreteness", "Courtesy", "Completeness"], correct: 1, exp: "Concrete messages are specific, tangible, and vivid." },
            { q: "Which type of communication refers to the use of bodily movements, facial expressions, and gestures?", options: ["Paralanguage", "Haptics", "Kinesics", "Proxemics"], correct: 2, exp: "Kinesics is the study of body language." },
            { q: "What is \"Paralanguage\" in oral communication?", options: ["The actual words spoken.", "The non-lexical component of speech, such as intonation, pitch, and speed.", "Hand gestures used while talking.", "The physical distance between speakers."], correct: 1, exp: "It’s about \"how\" you say something, not just \"what\" you say." },
            { q: "When writing a formal business letter, which part contains the recipient's name, title, and address?", options: ["Salutation", "Inside Address", "Heading", "Complimentary Close"], correct: 1, exp: "The inside address is the address of the person receiving the letter." },
            { q: "What is the primary purpose of an \"Inquiry Letter\"?", options: ["To complain about a defective product.", "To ask for information about a product, service, or job opening.", "To thank someone for an interview.", "To resign from a position."], correct: 1, exp: "It is a request for specific details or clarification." },
            { q: "In a digital environment, \"Netiquette\" refers to:", options: ["The speed of your internet connection.", "The rules of correct or polite behavior among people using the internet.", "A type of computer virus.", "The process of coding a website."], correct: 1, exp: "Network Etiquette includes being respectful in emails and social media." },
            { q: "Which communication style is direct and honest while also respecting the rights and feelings of others?", options: ["Aggressive", "Passive", "Assertive", "Passive-Aggressive"], correct: 2, exp: "Assertiveness is considered the most effective professional communication style." },
            { q: "What is \"Ethnocentrism\"?", options: ["The belief that all cultures are equal.", "The practice of learning a new language.", "The tendency to view one's own culture as superior to others.", "A form of government in ancient times."], correct: 2, exp: "It is a major barrier to effective intercultural communication." },
            { q: "An \"Informative Speech\" is designed to:", options: ["Convince the audience to change their opinion.", "Entertain the audience with jokes.", "Provide clear and accurate information about a topic.", "Move the audience to take immediate action."], correct: 2, exp: "The goal is to increase the audience's knowledge." },
            { q: "Which of the following is a \"Physical Barrier\" to communication?", options: ["Using technical jargon.", "A loud air-conditioner in the room.", "Personal bias against the speaker.", "Emotional distress."], correct: 1, exp: "Physical barriers are environmental distractions." },
            { q: "In communication, what does \"Decoding\" mean?", options: ["Turning an idea into a message.", "Interpreting and making sense of the received message.", "Sending a message through a channel.", "Blocking the message from being sent."], correct: 1, exp: "The receiver decodes the message sent by the encoder/sender." },
            { q: "What is the main difference between \"Formal\" and \"Informal\" communication?", options: ["Formal uses slang, while informal uses correct grammar.", "Formal follows established professional channels, while informal is spontaneous (like the \"grapevine\").", "Formal is always written, while informal is always spoken.", "There is no difference between them."], correct: 1, exp: "Formal communication adheres to organizational hierarchy." },
            { q: "Which model of communication depicts a circular process where the sender and receiver alternate roles and provide constant feedback?", options: ["Linear Model", "Transactional Model", "Interactive Model", "Transmission Model"], correct: 1, exp: "In the Transactional Model, communication is seen as a continuous, simultaneous process where both parties are senders and receivers at the same time." },
            { q: "What is the study of the use of time in communication, such as being early or late for a meeting?", options: ["Proxemics", "Haptics", "Chronemics", "Kinesics"], correct: 2, exp: "Chronemics refers to how humans perceive and use time to communicate messages, such as punctuality or the duration of a conversation." },
            { q: "Which \"C\" of communication focuses on being brief and avoiding unnecessary words while still delivering the message?", options: ["Clarity", "Conciseness", "Consideration", "Courtesy"], correct: 1, exp: "Conciseness is about \"saving the reader's time\" by getting to the point quickly and eliminating filler words." },
            { q: "What is \"Psychological Noise\" in the communication process?", options: ["A loud construction site nearby.", "Static on a phone line.", "Mental distractions, such as stress, bias, or anger.", "Poor grammar in a written letter."], correct: 2, exp: "Psychological Noise refers to internal interferences that prevent a person from focusing on the message being received." },
            { q: "Which type of communication takes place between people of the same status or level within an organization?", options: ["Upward Communication", "Downward Communication", "Horizontal (Lateral) Communication", "Vertical Communication"], correct: 2, exp: "Horizontal Communication occurs between colleagues or departments on the same hierarchical level to coordinate tasks and share information." },
            { q: "In intercultural communication, what is \"Cultural Relativism\"?", options: ["Believing one's own culture is the best.", "Ignoring other cultures entirely.", "Understanding a person's beliefs and behaviors within the context of their own culture.", "Forcing everyone to follow a single global culture."], correct: 2, exp: "Cultural Relativism is the opposite of ethnocentrism; it involves observing a culture on its own terms without judgment." },
            { q: "Which non-verbal communication element refers to the study of touch?", options: ["Oculesics", "Haptics", "Vocalics", "Olfactics"], correct: 1, exp: "Haptics is the study of touch as a form of communication, which varies significantly across different cultures." },
            { q: "What is the main goal of a \"Persuasive Speech\"?", options: ["To explain a complex scientific process.", "To tell a funny story to a group of friends.", "To influence the audience's beliefs, values, or actions.", "To provide technical instructions."], correct: 2, exp: "Persuasion aims to convince the listener to adopt a specific viewpoint or to take a particular course of action." },
            { q: "In the \"7 Cs of Communication,\" what does \"Courtesy\" imply?", options: ["Using a very formal vocabulary.", "Being polite, respectful, and considering the receiver’s feelings and perspective.", "Always agreeing with the other person.", "Sending a message as quickly as possible."], correct: 1, exp: "Courtesy involves being \"you-oriented\" rather than \"me-oriented,\" showing respect and positivity toward the audience." },
            { q: "What is the \"Inside Address\" in a business letter?", options: ["The address of the sender.", "The address of the recipient (the person receiving the letter).", "The website address mentioned in the letter.", "The return address on the envelope."], correct: 1, exp: "The Inside Address is placed below the date and includes the name, title, and business address of the person you are writing to." },
            { q: "Which term refers to a simplified language that develops as a means of communication between two or more groups that do not have a language in common?", options: ["Dialect", "Creole", "Pidgin", "Jargon"], correct: 2, exp: "A Pidgin is a \"make-shift\" language with no native speakers; it is used for basic communication between different linguistic groups." },
            { q: "When a Pidgin language becomes the first language of a new generation, it is called a:", options: ["Sociolect", "Creole", "Idyolek", "Register"], correct: 1, exp: "A Creole is a stable, natural language that developed from a pidgin and has become the primary language of a community." },
            { q: "What is \"Globalization\" in the context of communication?", options: ["The isolation of countries from one another.", "The increasing economic, political, and cultural integration and interaction of people worldwide.", "The use of only one language for all people on Earth.", "The ban of international travel."], correct: 1, exp: "Globalization has made intercultural communication essential as businesses and people interact across borders more frequently." },
            { q: "Which \"C\" of communication ensures that the message is free from grammatical errors and uses the right level of language?", options: ["Completeness", "Correctness", "Clarity", "Concreteness"], correct: 1, exp: "Correctness boosts the sender's credibility by ensuring the information is accurate and the language is used properly." },
            { q: "What is \"Proxemics\"?", options: ["The study of how humans use space and distance in communication.", "The study of eye contact.", "The study of facial expressions.", "The study of clothing and artifacts."], correct: 0, exp: "Proxemics explains how \"personal space\" varies by culture and relationship." },
            { q: "What is the \"Feedback\" component in the communication process?", options: ["The original idea of the sender.", "The response or reaction provided by the receiver.", "The medium used to send the message.", "The background noise during a call."], correct: 1, exp: "Feedback is crucial because it tells the sender whether the message was decoded correctly by the receiver." },
            { q: "Which communication barrier is caused by the use of words that have different meanings for different people?", options: ["Physical Barrier", "Semantic Barrier", "Pisyolohikal na Barrier", "Organizational Barrier"], correct: 1, exp: "Semantic Barriers occur when there is a misunderstanding of words, jargon, or slang." },
            { q: "In an email, \"BCC\" stands for:", options: ["Best Carbon Copy", "Blind Carbon Copy", "Business Communication Code", "Brief Communication Channel"], correct: 1, exp: "Blind Carbon Copy (BCC) allows you to send a copy of an email to someone without the other recipients knowing." },
            { q: "What is a \"Memo\" (Memorandum) primarily used for?", options: ["To apply for a job at a new company.", "To communicate internally within an organization.", "To advertise a product to the general public.", "To write a personal thank-you note."], correct: 1, exp: "Memos are short, informal reports used for internal communication to share news, policies, or instructions with staff." },
            { q: "Which non-verbal cue involves eye contact and gaze?", options: ["Haptics", "Oculesics", "Olfactics", "Chronemics"], correct: 1, exp: "Oculesics studies how eye behavior communicates interest, dominance, or sincerity." },
            { q: "What is \"Upward Communication\"?", options: ["Messages flowing from managers to employees.", "Messages flowing from subordinates/employees to higher-level managers.", "Messages between two people in the same department.", "Messages sent to external clients."], correct: 1, exp: "Upward Communication includes feedback, reports, or suggestions sent by employees to their supervisors." },
            { q: "Which of the following is an example of \"Interpersonal Communication\"?", options: ["Thinking about what to eat for dinner.", "Two friends discussing a movie.", "A news anchor broadcasting to millions.", "Writing a private journal entry."], correct: 1, exp: "Interpersonal Communication occurs between two or more people; it is the \"inter-group\" exchange of ideas." },
            { q: "What is \"Register\" in linguistics?", options: ["A list of students in a class.", "The variety of language used for a particular purpose or social setting (e.g., formal vs. informal).", "The speed at which a person speaks.", "The volume of a person's voice."], correct: 1, exp: "We change our Register depending on who we are talking to." },
            { q: "What is \"Digital Literacy\" in Purposive Communication?", options: ["The ability to type quickly.", "The ability to find, evaluate, and communicate information through various digital platforms.", "Buying the latest smartphone.", "Playing video games."], correct: 1, exp: "Digital Literacy involves the ethical and effective use of technology to share and process information." },
            { q: "Which \"C\" of communication ensures that the message includes all the facts the audience needs for the desired reaction?", options: ["Completeness", "Concreteness", "Conciseness", "Clarity"], correct: 0, exp: "Completeness means providing all necessary information so the receiver doesn't have to ask follow-up questions." },
            { q: "\"Jargon\" refers to:", options: ["Polite and respectful language.", "Specialized language used by a particular profession or group (e.g., legal or medical terms).", "Slang used by teenagers.", "The study of body movements."], correct: 1, exp: "Jargon can be a barrier if the audience is not part of that specific professional group." },
            { q: "Which type of speech is delivered with little to no preparation?", options: ["Manuscript Speech", "Memorized Speech", "Impromptu Speech", "Extemporaneous Speech"], correct: 2, exp: "Impromptu means \"on the spot,\" requiring the speaker to organize thoughts quickly without prior notice." },
            { q: "What is \"Media Literacy\"?", options: ["Owning a television set.", "The ability to access, analyze, and create media in various forms.", "Believing everything written in the newspaper.", "Working for a news company."], correct: 1, exp: "Media Literacy helps people become critical thinkers who can identify bias or \"fake news\" in the media." },
            { q: "What is \"Intercultural Communication Sensitivity\"?", options: ["Being easily offended by other people's cultures.", "Being aware and respectful of cultural differences while communicating.", "Forcing others to learn your language.", "Only hanging out with people from your own country."], correct: 1, exp: "Sensitivity allows for smoother interactions and reduces the chance of accidental offense in a globalized world." },
            { q: "Which part of a business letter is the \"Complimentary Close\"?", options: ["Dear Mr. Smith,", "Sincerely yours,", "Subject: Monthly Report", "123 Maple Street"], correct: 1, exp: "The Complimentary Close is the polite ending of the letter before the signature." },
            { q: "What is \"Vocalics\"?", options: ["The study of hand gestures.", "The study of paralanguage, including pitch, volume, and rate of speech.", "The study of smell as communication.", "The study of written words."], correct: 1, exp: "Vocalics focuses on how the voice is used to convey meaning beyond the words themselves." },
            { q: "Which barrier involves a receiver's lack of interest or \"selective listening\"?", options: ["Physical Barrier", "Attitudinal/Psychological Barrier", "Linguistic Barrier", "Systematic Barrier"], correct: 1, exp: "If a receiver is biased or simply doesn't care, the message will likely be distorted or ignored." },
            { q: "In the \"SMCR\" model, what does \"S\" stand for?", options: ["System", "Signal", "Source (Sender)", "Situation"], correct: 2, exp: "The Source is the person who originates the message and starts the communication process." },
            { q: "What is \"Plagiarism\" in professional and academic communication?", options: ["Using a dictionary to find meanings.", "Properly citing a source.", "Passing off someone else's work or ideas as your own.", "Translating a text into another language."], correct: 2, exp: "Plagiarism is a serious ethical violation that destroys the credibility of a communicator." },
            { q: "What is the primary function of \"Feedback\" in communication?", options: ["To make the message longer.", "To confuse the sender.", "To verify that the message has been accurately understood.", "To end the conversation immediately."], correct: 2, exp: "Without Feedback, the sender has no way of knowing if the \"Encoding\" and \"Decoding\" processes were successful." }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 60;

        // Audio helper (copied from script-firebase-fixed.js for standalone quiz pages)
        function playAudio(id) {
            try {
                const el = document.getElementById(id);
                if (!el) return;
                el.currentTime = 0;
                const p = el.play();
                if (p && p.catch) p.catch(() => {});
            } catch (e) {}
        }
        function startQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 60;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    selectOption(-1); 
                }
            }, 1000);
        }

        function selectOption(index) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(btn => btn.disabled = true);
            
            if (index === q.correct) {
                options[index].classList.add('correct');
                score++;
                document.getElementById('feedbackTitle').innerText = "Correct!"; // Changed from "Correct!"
                document.getElementById('feedbackTitle').style.color = "var(--success)"; // Changed from "#4CAF50"
                playAudio('sound-correct');
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect"; // Changed from "Incorrect"
                document.getElementById('feedbackTitle').style.color = "var(--danger)"; // Changed from "#f44336"
                playAudio('sound-wrong');
            }
            
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            document.getElementById('finalScore').innerText = score;
            
            const feedback = document.getElementById('resultFeedback');
            if (score === questions.length) {
                feedback.innerText = "Perfect Score! You're a Master Communicator!";
            } else if (score >= (questions.length * 0.8)) {
                feedback.innerText = "Excellent! You have a strong grasp of communication concepts.";
            } else if (score >= (questions.length * 0.5)) {
                feedback.innerText = "Good job! Review the explanations to master the topics.";
            } else {
                feedback.innerText = "Keep practicing! Communication is key to success.";
            }
            const finishAudio = document.getElementById('sound-finish'); if (finishAudio) { finishAudio.currentTime = 0; finishAudio.play().catch(()=>{}); }
            saveResultToFirestore('Purposive Communication', score, questions.length);
        }

        startQuiz();
    </script>
</body>
</html>
