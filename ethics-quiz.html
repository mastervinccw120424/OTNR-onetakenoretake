<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashReview - Ethics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Quiz Page -->
    <div id="quizPage" class="page active" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="dashboard-header" style="width: 100%; max-width: 800px; margin-bottom: 20px;">
            <button class="btn-back" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="font-size: 1.2rem; color: var(--text-muted);">Ethics</h2>
            <div class="quiz-timer" id="quizTimer">60s</div>
            <div id="quizProgress" style="font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 15px;">1 / 50</div>
        </div>

        <div class="quiz-container">
            <div class="quiz-question-box">
                <h3 id="questionText">Loading question...</h3>
            </div>

            <div class="quiz-options" id="quizOptions">
                <!-- Options inserted here -->
            </div>

            <div id="explanationBox" class="explanation-box" style="display: none;">
                <strong id="feedbackTitle">Correct!</strong>
                <p id="explanationText">Explanation goes here...</p>
            </div>

            <button id="nextBtn" class="btn-submit" style="display: none; margin-top: 10px;" onclick="nextQuestion()">
                Next Question <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Quiz Result Page -->
    <div id="quizResultPage" class="page" style="display: flex; align-items: center; justify-content: center;">
        <div class="result-container text-center">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">FlashReview Completed!</h2>
            <p class="result-score">Your Score: <span id="finalScore">0</span> / <span id="maxScore">50</span></p>
            <div id="resultFeedback" class="mb-20">Great job! Keep reviewing.</div>
            
            <div class="topic-actions">
                <button class="btn-action" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
                <button class="btn-action secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Restart FlashReview
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Which branch of Ethics deals with the practical application of moral considerations, such as in medicine, business, or teaching?", options: ["Meta-ethics", "Normative Ethics", "Applied Ethics", "Descriptive Ethics"], correct: 2, exp: "Applied Ethics uses moral theories to solve real-world problems." },
            { q: "According to Aristotle, virtue is the \"Golden Mean\" between two extremes. What does this mean?", options: ["Always choosing the most expensive option.", "Finding the balance between excess and deficiency.", "Following the majority’s opinion.", "Avoiding any form of action or emotion."], correct: 1, exp: "For example, courage is the mean between cowardice and recklessness." },
            { q: "Which ethical theory, proposed by Immanuel Kant, suggests that an action is right if it is done out of duty and can be made a \"universal law\"?", options: ["Utilitarianism", "Deontology", "Virtue Ethics", "Hedonism"], correct: 1, exp: "Deontology focuses on rules and duties regardless of the consequences." },
            { q: "\"The greatest good for the greatest number\" is the central principle of which ethical framework?", options: ["Egoism", "Altruism", "Utilitarianism", "Nihilism"], correct: 2, exp: "Utilitarianism, led by Bentham and Mill, focuses on the consequences/utility of an action." },
            { q: "A teacher refuses to change a student's grade even if offered a large bribe because they believe \"honesty is an absolute rule.\" This teacher is following:", options: ["Situation Ethics", "Moral Relativism", "Moral Absolutism", "Pragmatism"], correct: 2, exp: "Absolutism holds that some actions are inherently right or wrong, regardless of context." },
            { q: "What is \"Whistleblowing\" in a professional setting?", options: ["Cheering for a colleague's success.", "Reporting illegal or unethical activities within an organization to authorities.", "Spreading rumors about a boss.", "Mediating a fight between students."], correct: 1, exp: "It is a difficult ethical choice often protected by law to prevent corruption." },
            { q: "In Ethics, \"Human Acts\" (Actus Humani) are different from \"Acts of Man\" because Human Acts are:", options: ["Done instinctively like breathing.", "Performed with knowledge, freedom, and voluntariness.", "Actions performed while sleeping.", "Physical movements only."], correct: 1, exp: "Only Human Acts are subject to moral judgment." },
            { q: "Which of the following is an example of an \"Ethical Dilemma\"?", options: ["Deciding what to wear to school.", "Choosing between two right values that are in conflict.", "Following a clear school policy.", "Forgetting to bring a pen to an exam."], correct: 1, exp: "A dilemma occurs when any choice made results in violating one moral principle to save another." },
            { q: "\"When in Rome, do as the Romans do\" is an expression of which ethical view?", options: ["Cultural Relativism", "Subjectivism", "Objectivism", "Universalism"], correct: 0, exp: "Relativism suggests that morality is defined by the culture or society one is in." },
            { q: "What is the \"Silver Rule\" of Ethics?", options: ["Do unto others as you would have them do unto you.", "Do not do unto others what you would not want them to do unto you.", "He who has the gold makes the rules.", "An eye for an eye, a tooth for a tooth."], correct: 1, exp: "Confucius is credited with this \"negative\" formulation of the Golden Rule." },
            { q: "Which term refers to the internal sense of right and wrong that acts as a guide to one's behavior?", options: ["Ego", "Conscience", "Libido", "Persona"], correct: 1, exp: "Conscience is the practical judgment of reason." },
            { q: "In the hierarchy of values, which are considered the highest values according to Max Scheler?", options: ["Pleasure values (Sensual)", "Vital values (Health/Well-being)", "Holy values (Spirituality/God)", "Cultural values (Justice/Truth)"], correct: 2, exp: "Holy values are the peak of Scheler’s value hierarchy." },
            { q: "A doctor helps a terminally ill patient end their life at the patient's request. This is known as:", options: ["Homicide", "Euthanasia", "Palliative Care", "Eugenics"], correct: 1, exp: "Mercy killing or euthanasia is a major topic in bioethics." },
            { q: "What is the ethical principle of \"Autonomy\"?", options: ["The right of an individual to make their own informed decisions.", "The duty to do good to others.", "The duty to avoid harming others.", "The fair distribution of benefits and burdens."], correct: 0, exp: "Respect for autonomy is a core pillar of modern ethics." },
            { q: "Which of the following describes \"Double Effect\"?", options: ["Doing two good things at once.", "An action that has both a good effect and a foreseeable bad effect.", "Making a mistake twice.", "Lying to protect a friend."], correct: 1, exp: "The principle helps determine if an action is permissible when a good act results in an unintended bad consequence." },
            { q: "Which of the following is the best definition of \"Moral Character\"?", options: ["The ability to follow rules only when being watched.", "The existence or lack of virtues such as integrity, courage, and fortitude.", "Having a high IQ score in an ethics exam.", "Being famous in the community."], correct: 1, exp: "Moral character refers to the stable set of habits and traits that define a person's ethical identity." },
            { q: "According to St. Thomas Aquinas, what is the \"Natural Law\"?", options: ["The law of the jungle where the strongest survive.", "Human participation in the Eternal Law through the use of reason.", "Laws written by the government to protect nature.", "The scientific laws of gravity and motion."], correct: 1, exp: "Aquinas argued that humans can use reason to discern the basic moral principles ordained by God." },
            { q: "What is the \"Categorical Imperative\" associated with Immanuel Kant?", options: ["Act only if it makes you happy.", "Act only if it benefits the majority.", "Act only according to that maxim whereby you can at the same time will that it should become a universal law.", "Act only when you are told to do so by an authority."], correct: 2, exp: "It is a moral \"test\" to see if your action would still be right if everyone else in the world did the same thing." },
            { q: "In Filipino Ethics, \"Utang na Loob\" can sometimes lead to ethical issues when:", options: ["You pay back a debt with interest.", "It is used to bypass laws or professional standards to favor a benefactor.", "You say \"thank you\" to a stranger.", "You help your parents when they are old."], correct: 1, exp: "While a positive value of gratitude, it becomes unethical when it results in nepotism or corruption." },
            { q: "Which stage of Kohlberg's Moral Development involves obeying rules simply to avoid physical punishment?", options: ["Universal Ethical Principle", "Social Contract Orientation", "Punishment and Obedience Orientation", " \"Good Boy/Nice Girl\" Orientation"], correct: 2, exp: "This is the most basic level of morality, usually found in young children." },
            { q: "What does \"Non-maleficence\" mean in bioethics?", options: ["To do good to every patient.", "\"First, do no harm.\"", "To allow the patient to choose.", "To tell the truth at all times."], correct: 1, exp: "It is the duty of healthcare providers to avoid inflicting unnecessary pain or injury." },
            { q: " \"Hedonism\" is an ethical view that identifies \"Good\" with:", options: ["Knowledge", "Power", "Pleasure", "Duty"], correct: 2, exp: "Hedonists believe that the ultimate goal of life is to maximize pleasure and minimize pain." },
            { q: "Which term refers to the feeling of \"shared inner self\" or empathy in Filipino psychology/ethics?", options: ["Hiya", "Pakikisama", "Kapwa", "Amor Propio"], correct: 2, exp: "Kapwa is the core concept of Filipino social interaction, emphasizing that the \"other\" is also part of oneself." },
            { q: "A person who believes that \"there is no objective truth in morality\" and that \"everything is just a matter of opinion\" is a:", options: ["Moral Subjectivist", "Moral Objectivist", "Deontologist", "Virtue Ethicist"], correct: 0, exp: "Subjectivism claims that moral judgments are based purely on individual feelings or perspectives." },
            { q: "What is the \"Principle of Beneficence\"?", options: ["The duty to act in ways that benefit others and promote their welfare.", "The duty to keep secrets.", "The duty to be fair to everyone.", "The duty to obey the law."], correct: 0, exp: "Unlike non-maleficence (avoiding harm), beneficence requires taking positive steps to help others." },
            { q: "In Virtue Ethics, what is \"Eudaimonia\"?", options: ["A type of physical exercise.", "Human flourishing or living well.", "A state of deep sleep.", "Fear of the gods."], correct: 1, exp: "Aristotle taught that eudaimonia is the ultimate purpose of human life, achieved through practicing virtue." },
            { q: "Which of the following is a \"Cardinal Virtue\" according to classic philosophy?", options: ["Wealth", "Prudence", "Beauty", "Fame"], correct: 1, exp: "The four cardinal virtues are Prudence, Justice, Fortitude, and Temperance." },
            { q: " \"Teleological\" ethics (from the Greek telos) focuses on:", options: ["The rules of the action.", "The intention of the person.", "The end, goal, or consequence of an action.", "The cultural background of the act."], correct: 2, exp: "Utilitarianism is a form of teleological ethics because it looks at the outcome (the \"end\")." },
            { q: "What is \"Moral Courage\"?", options: ["The strength to lift heavy weights.", "The ability to act rightly even when facing popular opposition, shame, or scandal.", "Being aggressive toward people you dislike.", "Knowing all the definitions in an ethics book."], correct: 1, exp: "Moral courage is doing the right thing despite the personal risk or social cost." },
            { q: "The \"Divine Command Theory\" states that:", options: ["Humans create their own laws.", "What is moral is determined solely by what God commands.", "Nature is the source of all morality.", "The King is always right."], correct: 1, exp: "In this theory, an action is good because God says it is good." },
            { q: "What is \"Amor Propio\"?", options: ["Love for others.", "Self-esteem or a sense of self-respect that prevents a person from being humiliated.", "Love for one's country.", "Love for money."], correct: 1, exp: "It is a Filipino value related to maintaining one's dignity and \"face.\"" },
            { q: " \"Justice\" as an ethical principle primarily deals with:", options: ["Making people happy.", "Giving each person what is their due or what they deserve.", "Following the orders of a boss.", "Being kind to animals."], correct: 1, exp: "Justice involves fairness, equity, and the impartial distribution of resources." },
            { q: "What is the difference between \"Ethics\" and \"Morality\"?", options: ["There is no difference; they are exactly the same.", "Ethics is the study/theory, while Morality is the actual practice/application.", "Morality is for adults, Ethics is for children.", "Ethics is only for doctors and lawyers."], correct: 1, exp: "Ethics is the \"science\" or \"philosophy\" that investigates what makes things right or wrong." },
            { q: "In the \"Trolley Problem\" thought experiment, a person who chooses to sacrifice one person to save five is likely using which framework?", options: ["Deontology", "Utilitarianism", "Virtue Ethics", "Egoism"], correct: 1, exp: "This framework prioritizes the \"greatest good for the greatest number.\"" },
            { q: "Which of the following is a \"soft\" Filipino value that emphasizes social harmony and avoiding conflict?", options: ["Pakikisama", "Katapatan", "Kagitingan", "Sipag"], correct: 0, exp: "Pakikisama is the desire to maintain smooth interpersonal relationships (SIR)." },
            { q: " \"Socratic Intellectualism\" claims that:", options: ["People are naturally evil.", "No one does wrong willingly; they do wrong because they are ignorant of the Good.", "Only smart people can be moral.", "Studying science makes you a saint."], correct: 1, exp: "Socrates believed that if a person truly knows what is right, they will do what is right." },
            { q: "What is \"Fidelity\" in professional ethics?", options: ["Being physically strong.", "Faithfulness to one's duties, obligations, and promises.", "Having a lot of friends.", "Earning a high salary."], correct: 1, exp: "Fidelity involves loyalty and keeping trust, especially in a professional-client relationship." },
            { q: "An \"Erring Conscience\" is one that:", options: ["Is always right.", "Mistakes something bad for something good (or vice versa) due to wrong reasoning.", "Does not care about morality at all.", "Only works during the daytime."], correct: 1, exp: "It is a conscience that judge's incorrectly based on false premises." },
            { q: " \"Altruism\" is the opposite of:", options: ["Kindness", "Egoism", "Justice", "Honesty"], correct: 1, exp: "Altruism is acting for the sake of others, while egoism is acting for one's own self-interest." },
            { q: "What is \"Moral Relativism\"?", options: ["The belief that morality is universal and never changes.", "The belief that morality depends on the specific culture, time, or situation.", "The belief that only relatives should be treated well.", "The belief that religion is the only source of morality."], correct: 1, exp: "Relativists argue that \"what is right for you might not be right for me.\"" },
            { q: "The \"Principle of Stewardship\" emphasizes:", options: ["Owning as much land as possible.", "Caring for resources (like the environment) that do not belong to us but are entrusted to our care.", "Making sure your boss is happy.", "Selling all your possessions."], correct: 1, exp: "It is often applied to environmental ethics and managing public funds." },
            { q: "Which philosopher is known for the \"Veil of Ignorance\" to determine social justice?", options: ["John Rawls", "Jean-Paul Sartre", "Friedrich Nietzsche", "Thomas Hobbes"], correct: 0, exp: "Rawls suggested that to make fair rules, we should imagine we don't know who we will be in society." },
            { q: "What is \"Veracity\" in ethics?", options: ["The duty to be brave.", "The duty to tell the truth and not deceive others.", "The duty to be clean.", "The duty to save money."], correct: 1, exp: "Veracity is the cornerstone of trust in all human and professional interactions." },
            { q: " \"Emotivism\" suggests that moral statements are just:", options: ["Logical facts.", "Mathematical formulas.", "Expressions of emotions or \"boo/hurrah\" reactions.", "Commands from the government."], correct: 2, exp: "Emotivists believe \"stealing is wrong\" just means \"I don't like stealing!\"" },
            { q: "Which of the following is an example of \"Internalized\" morality?", options: ["Not stealing because a policeman is nearby.", "Not stealing because you would feel guilty and you value honesty.", "Not stealing because you might get fined.", "Not stealing because your parents told you not to."], correct: 1, exp: "Internalization means the value is part of your character, not just a reaction to external pressure." },
            { q: "What is \"Plagiarism\"?", options: ["Writing a long essay.", "Using someone else's ideas or words without proper acknowledgment/credit.", "Reading too many books.", "Failing an exam."], correct: 1, exp: "It is a major ethical violation in academia and professional writing." },
            { q: " \"Moral Nihilism\" is the belief that:", options: ["Everything is moral.", "Morality does not exist at all; nothing is truly right or wrong.", "Only the state can decide what is moral.", "Life is about having fun."], correct: 1, exp: "Nihilists reject all moral claims as meaningless or non-existent." },
            { q: "In Ethics, \"Freedom\" is necessary for \"Responsibility\" because:", options: ["Free people don't have to follow laws.", "You cannot be held morally accountable for an action you were forced to do.", "Freedom means you can do whatever you want.", "Responsibility is only for those who are in jail."], correct: 1, exp: "Without the power to choose (freedom), an act has no moral weight." },
            { q: " \"Situational Ethics\" suggests that the most important factor in a moral decision is:", options: ["The ancient rules.", "The law of the country.", "The context and the \"law of love\" (agape).", "The person's social status."], correct: 2, exp: "Popularized by Joseph Fletcher, it argues that love is the only absolute." },
            { q: "What is the ultimate goal of studying Ethics?", options: ["To become a lawyer.", "To learn how to argue with people.", "To develop a critical mind and lead a \"good\" and meaningful life.", "To memorize all the names of philosophers."], correct: 2, exp: "Ethics is practical; it aims at the improvement of human conduct." }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 60;

        function startQuiz() {
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('quizProgress').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            
            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 60;
            document.getElementById('quizTimer').innerText = `${timeLeft}s`;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('quizTimer').innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    selectOption(-1); 
                }
            }, 1000);
        }

        function playSound(file) {
            if (localStorage.getItem('isMuted') === 'true') return;
            const audio = new Audio(file);
            audio.play().catch(e => {});
        }

        function selectOption(index) {
            clearInterval(timer);
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.option-btn');
            
            options.forEach(btn => btn.disabled = true);
            
            if (index === q.correct) {
                options[index].classList.add('correct');
                score++;
                document.getElementById('feedbackTitle').innerText = "Correct!";
                document.getElementById('feedbackTitle').style.color = "#4CAF50";
                playSound('correct.mp3');
            } else {
                if (index !== -1) options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                document.getElementById('feedbackTitle').innerText = "Incorrect";
                document.getElementById('feedbackTitle').style.color = "#f44336";
                playSound('wrong.mp3');
            }
            
            document.getElementById('explanationText').innerText = q.exp;
            document.getElementById('explanationBox').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('quizResultPage').classList.add('active');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('maxScore').innerText = questions.length;
            
            const feedback = document.getElementById('resultFeedback');
            const percentage = (score / questions.length) * 100;

            if (percentage === 100) {
                feedback.innerText = "Perfect Score! You're an Ethical Master!";
            } else if (percentage >= 80) {
                feedback.innerText = "Excellent! You have a strong grasp of ethical principles.";
            } else if (percentage >= 50) {
                feedback.innerText = "Good job! Review the concepts to deepen your understanding.";
            } else {
                feedback.innerText = "Keep practicing! Ethics is fundamental to good decision-making.";
            }
        }

        startQuiz();
    </script>
</body>
</html>
